<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>西归浦一日 · Seogwipo Day Trip · 서귀포 하루</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'PingFang SC', BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f0f7f4;
    color: #1a2e1a;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Banner */
  header {
    position: relative;
    padding: 14px 18px;
    background:
      linear-gradient(rgba(0,30,20,0.55), rgba(0,20,15,0.70)),
      url('https://images.unsplash.com/photo-1548115184-bc6544d06a58?w=800&q=80') center 40% / cover;
    color: white;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header .title-area h1 {
    font-size: 17px;
    font-weight: 700;
    text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    letter-spacing: 0.3px;
  }
  header .title-area p {
    font-size: 12px;
    opacity: 0.88;
    margin-top: 3px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  }
  .lang-btn {
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.4);
    color: white;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 11px;
    cursor: pointer;
    flex-shrink: 0;
    backdrop-filter: blur(4px);
  }
  .lang-btn:hover { background: rgba(255,255,255,0.35); }

  /* Weather strip */
  .weather-strip {
    background: #1a5c3a;
    color: #d4f7e7;
    font-size: 11px;
    padding: 5px 14px;
    display: flex;
    gap: 16px;
    flex-shrink: 0;
  }
  .weather-strip span { display: flex; align-items: center; gap: 4px; }

  /* Layout */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }
  #map {
    flex: 1;
    order: 1;
    min-height: 0;
  }
  .sidebar {
    width: 340px;
    order: 2;
    overflow-y: auto;
    background: #f0f7f4;
    padding: 10px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* Spot cards */
  .day-card {
    background: white;
    border-radius: 10px;
    box-shadow: 0 1px 5px rgba(0,50,30,0.1);
    overflow: hidden;
  }
  .day-card h3 {
    background: linear-gradient(135deg, #1a5c3a 0%, #2e8b57 100%);
    color: white;
    padding: 8px 12px;
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .spot-item {
    display: flex;
    align-items: flex-start;
    gap: 9px;
    padding: 9px 12px;
    border-bottom: 1px solid #f0f5f2;
    cursor: pointer;
    transition: background 0.15s;
  }
  .spot-item:last-child { border-bottom: none; }
  .spot-item:hover { background: #f5fbf7; }
  .spot-dot {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .spot-info { flex: 1; min-width: 0; }
  .spot-name {
    font-size: 12.5px;
    font-weight: 600;
    color: #1a2e1a;
    line-height: 1.3;
  }
  .spot-name .ko { font-size: 10.5px; color: #666; font-weight: 400; margin-left: 4px; }
  .spot-desc { font-size: 11px; color: #555; margin-top: 2px; line-height: 1.4; }
  .spot-time {
    font-size: 10px;
    color: #2e8b57;
    background: #e8f5ed;
    padding: 1px 6px;
    border-radius: 8px;
    margin-top: 4px;
    display: inline-block;
    font-weight: 500;
  }
  .spot-tip {
    font-size: 10px;
    color: #b45309;
    background: #fef3c7;
    padding: 1px 6px;
    border-radius: 8px;
    margin-top: 3px;
    display: inline-block;
  }

  /* Color classes */
  .c-attraction { background: #e74c3c; }
  .c-food       { background: #e67e22; }
  .c-walk       { background: #27ae60; }
  .c-cafe       { background: #8e44ad; }

  /* Map legend */
  .legend {
    background: rgba(255,255,255,0.92);
    border-radius: 8px;
    padding: 7px 10px;
    font-size: 11px;
    line-height: 1.8;
    backdrop-filter: blur(4px);
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot {
    width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
  }

  /* Mobile */
  @media (max-width: 680px) {
    body { overflow: auto; }
    .layout { flex-direction: column; overflow: visible; }
    #map { order: 2; height: 45vh; flex: none; }
    .sidebar { order: 1; width: 100%; overflow: visible; max-height: none; }
  }

  /* Scrollbar */
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: #b2d8c2; border-radius: 4px; }

  /* Lang layers */
  .lang-zh, .lang-en, .lang-ko { display: none; }
  body.zh .lang-zh { display: inline; }
  body.en .lang-en { display: inline; }
  body.ko .lang-ko { display: inline; }
  body.zh .spot-desc.zh, body.en .spot-desc.en, body.ko .spot-desc.ko { display: block; }
  .spot-desc { display: none; }
</style>
</head>
<body class="zh">

<header>
  <div class="title-area">
    <h1>
      <span class="lang-zh">🌊 西归浦一日轻松游</span>
      <span class="lang-en">🌊 Seogwipo Easy Day Trip</span>
      <span class="lang-ko">🌊 서귀포 하루 여행</span>
    </h1>
    <p>
      <span class="lang-zh">济州岛西南 · 带鱼 · 市场 · 海岸漫步</span>
      <span class="lang-en">Jeju South · Hairtail · Market · Coastal Walk</span>
      <span class="lang-ko">제주 남서부 · 갈치 · 시장 · 올레길</span>
    </p>
  </div>
  <button class="lang-btn" onclick="cycleLang()">🌐 中/EN/한</button>
</header>

<div class="weather-strip">
  <span>📅 3/27 金</span>
  <span>☀️ 11–16°C</span>
  <span>🌬️ 阵风21km/h</span>
  <span>🧴 UV指数6 防晒</span>
</div>

<div class="layout">
  <div id="map"></div>
  <div class="sidebar" id="sidebar"></div>
</div>

<script>
const LANGS = ['zh','en','ko'];
let langIdx = 0;
function cycleLang() {
  langIdx = (langIdx + 1) % LANGS.length;
  document.body.className = LANGS[langIdx];
}

// 住处坐标：칠십리로139번길 5, 서귀포 (33.2439, 126.5679)
const HOME = { lat: 33.2439, lng: 126.5679 };

const spots = [
  {
    id: 0,
    nameZh: '🏠 住处 · Chilsimni-ro 139',
    nameEn: '🏠 Your Stay · Chilsimni-ro 139',
    nameKo: '🏠 숙소 · 칠십리로139번길',
    descZh: '你的住处，出发点。步行到正房瀑布约10分钟。',
    descEn: 'Your base. ~10 min walk to Jeongbang Waterfall.',
    descKo: '숙소 위치. 정방폭포까지 도보 약 10분.',
    time: '출발점',
    lat: 33.2439, lng: 126.5679,
    type: 'hotel', emoji: '🏠',
    isHome: true
  },
  {
    id: 1,
    nameZh: '정방폭포 · 正房瀑布',
    nameEn: 'Jeongbang Waterfall',
    nameKo: '정방폭포',
    descZh: '住处步行10分钟！亚洲少见的"入海瀑布"——瀑布直接落入大海。早上人少，光线好。',
    descEn: '10 min walk from your stay! Rare waterfall that falls directly into the sea. Go early for fewer crowds.',
    descKo: '숙소에서 도보 10분! 바다로 직접 떨어지는 희귀 폭포. 아침에 방문 추천.',
    time: '09:00–10:00',
    lat: 33.2449, lng: 126.5683,
    type: 'attraction', emoji: '💧'
  },
  {
    id: 2,
    nameZh: '올레길 7코스 · 奥莱步道7号',
    nameEn: 'Olle Trail Route 7',
    nameKo: '올레길 7코스',
    descZh: '正房瀑布起步，沿海岸向西。海风+火山岩+碧绿海水，走1小时即可，节奏自己控制。',
    descEn: 'Start from Jeongbang, walk west along the coast. Sea breeze + volcanic rock + emerald water. ~1hr easy walk.',
    descKo: '정방폭포에서 서쪽으로 해안 걷기. 1시간 정도 편안한 산책.',
    time: '10:00–11:30',
    lat: 33.2435, lng: 126.5700,
    type: 'walk', emoji: '🚶'
  },
  {
    id: 3,
    nameZh: '서귀포매일올레시장 · 西归浦市场',
    nameEn: 'Seogwipo Daily Olle Market',
    nameKo: '서귀포매일올레시장',
    descZh: '步道结束后步行过来。当地人菜市场，不是旅游市场。鱼饼、黑猪肉煎饼、汉拿峰橘子现买现吃。',
    descEn: 'Walk over after the trail. Authentic local market. Try fish cake, black pork jeon, Hallabong oranges.',
    descKo: '올레길 후 도보 이동. 현지인 시장. 어묵, 흑돼지 전, 한라봉 추천.',
    time: '11:30–12:30',
    lat: 33.2497, lng: 126.5624,
    type: 'attraction', emoji: '🏪'
  },
  {
    id: 4,
    nameZh: '갈치조림 · 带鱼午餐',
    nameEn: 'Galchi · Hairtail Lunch',
    nameKo: '갈치조림 점심',
    descZh: '市场附近找갈치집。갈치조림（红烧带鱼配萝卜）或갈치회（带鱼刺身）——西归浦专属，其他地方很少见。',
    descEn: 'Find a 갈치집 near the market. Braised hairtail with radish, or hairtail sashimi — Seogwipo specialty.',
    descKo: '시장 근처 갈치집. 갈치조림 또는 갈치회 — 서귀포 특산.',
    time: '12:30–14:00',
    lat: 33.2490, lng: 126.5610,
    type: 'food', emoji: '🐟',
    tip: '招牌：갈치조림 / 갈치회'
  },
  {
    id: 5,
    nameZh: '이중섭거리 · 李仲燮街',
    nameEn: 'Lee Jung-seop Street',
    nameKo: '이중섭거리',
    descZh: '饭后散步5分钟即到。西归浦艺术小街，不拥挤，喝杯咖啡、看看画廊。',
    descEn: '5min walk after lunch. Quiet art street, coffee, galleries. No crowds.',
    descKo: '점심 후 도보 5분. 조용한 예술 거리, 카페, 갤러리.',
    time: '14:30–16:00',
    lat: 33.2498, lng: 126.5560,
    type: 'cafe', emoji: '☕'
  },
  {
    id: 6,
    nameZh: '서귀포 해안 · 海边日落',
    nameEn: 'Seogwipo Sunset Coast',
    nameKo: '서귀포 해안 일몰',
    descZh: '住处附近的海边。西归浦朝南，傍晚光线绝佳。找块礁石坐着看日落。',
    descEn: 'Near your stay. South-facing coast, stunning golden hour. Find a rock, watch the sunset.',
    descKo: '숙소 근처 해안. 남향이라 일몰 장관. 바위에 앉아 노을 감상.',
    time: '17:30–18:30',
    lat: 33.2440, lng: 126.5650,
    type: 'walk', emoji: '🌅'
  }
];

const typeColor = {
  attraction: '#e74c3c',
  food:       '#e67e22',
  walk:       '#27ae60',
  cafe:       '#8e44ad',
  hotel:      '#2980b9'
};
const typeLabelZh = { attraction: '景点', food: '美食', walk: '步道', cafe: '咖啡', hotel: '住处' };

// Render sidebar
const sidebar = document.getElementById('sidebar');
const card = document.createElement('div');
card.className = 'day-card';
card.innerHTML = `<h3>🗓️ <span class="lang-zh">西归浦轻松一日</span><span class="lang-en">Seogwipo Easy Day</span><span class="lang-ko">서귀포 하루</span></h3>`;
let sidebarNum = 0;
spots.forEach((s) => {
  const item = document.createElement('div');
  item.className = 'spot-item';
  item.id = `spot-${s.id}`;
  const dotLabel = s.isHome ? '🏠' : (++sidebarNum);
  item.innerHTML = `
    <div class="spot-dot" style="background:${typeColor[s.type]};font-size:${s.isHome?'13px':'11px'}">${dotLabel}</div>
    <div class="spot-info">
      <div class="spot-name">
        ${s.isHome ? '' : s.emoji + ' '}<span class="lang-zh">${s.nameZh}</span><span class="lang-en">${s.nameEn}</span><span class="lang-ko">${s.nameKo}</span>
      </div>
      <div class="spot-desc zh">${s.descZh}</div>
      <div class="spot-desc en">${s.descEn}</div>
      <div class="spot-desc ko">${s.descKo}</div>
      <span class="spot-time">${s.time}</span>
      ${s.tip ? `<br><span class="spot-tip">💡 ${s.tip}</span>` : ''}
    </div>
  `;
  item.addEventListener('click', () => flyTo(s));
  card.appendChild(item);
});
sidebar.appendChild(card);

// Map
const map = L.map('map').setView([33.2460, 126.5640], 14);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors',
  maxZoom: 18
}).addTo(map);

const markers = {};
let spotNum = 0;
spots.forEach((s) => {
  let html;
  if (s.isHome) {
    html = `<div style="width:32px;height:32px;border-radius:50%;background:#2980b9;
      border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.4);
      display:flex;align-items:center;justify-content:center;
      font-size:14px;">🏠</div>`;
  } else {
    spotNum++;
    html = `<div style="width:28px;height:28px;border-radius:50%;background:${typeColor[s.type]};
      border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.3);
      display:flex;align-items:center;justify-content:center;
      color:white;font-weight:700;font-size:12px;">${spotNum}</div>`;
  }
  const icon = L.divIcon({ className: '', html, iconSize: [32,32], iconAnchor: [16,16] });
  const m = L.marker([s.lat, s.lng], {icon}).addTo(map);
  m.bindPopup(`<b>${s.emoji} ${s.nameZh}</b><br>${s.nameEn}<br><small style="color:#2e8b57">${s.time}</small>`);
  markers[s.id] = m;
});

// Route line (skip home marker from route)
const routeSpots = spots.filter(s => !s.isHome);
const latlngs = routeSpots.map(s => [s.lat, s.lng]);
L.polyline(latlngs, {color: '#2e8b57', weight: 2, dashArray: '5,6', opacity: 0.6}).addTo(map);

// Dashed line from home to first spot
L.polyline([[HOME.lat, HOME.lng], [routeSpots[0].lat, routeSpots[0].lng]],
  {color: '#2980b9', weight: 2, dashArray: '4,5', opacity: 0.5}).addTo(map);

function flyTo(s) {
  map.flyTo([s.lat, s.lng], 16, {duration: 0.8});
  markers[s.id].openPopup();
  document.querySelectorAll('.spot-item').forEach(el => el.style.background = '');
  const el = document.getElementById(`spot-${s.id}`);
  if (el) { el.style.background = '#e8f5ed'; el.scrollIntoView({behavior:'smooth',block:'nearest'}); }
}

// Legend
const legend = L.control({position:'bottomleft'});
legend.onAdd = () => {
  const div = L.DomUtil.create('div','legend');
  div.innerHTML = Object.entries(typeColor).map(([t,c]) =>
    `<div class="legend-item"><div class="legend-dot" style="background:${c}"></div>${typeLabelZh[t]}</div>`
  ).join('');
  return div;
};
legend.addTo(map);
</script>
</body>
</html>
