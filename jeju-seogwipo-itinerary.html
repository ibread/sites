<html lang="zh">
<head>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

    font-family: -apple-system, 'PingFang SC', BlinkMacSystemFont, "Segoe UI", sans-serif;

    color: #1a2e1a;

    display: flex;

    overflow: hidden;
  }

  /* Banner */
  header {
    position: relative;

    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .lang-btn {
    background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.38);

  }
  .lang-btn:hover { background: rgba(255,255,255,0.32); }

  /* Day tabs */
  .day-tabs {
    display: flex; background: #1a5c3a; flex-shrink: 0;
  }
  .day-tab {
    flex: 1; padding: 8px 4px; text-align: center; font-size: 12px; font-weight: 600;
    color: rgba(255,255,255,0.65); cursor: pointer; border-bottom: 3px solid transparent;
    transition: all 0.15s;
  }
  .day-tab.active { color: white; border-bottom-color: #7ed8a8; background: rgba(255,255,255,0.1); }

  /* Weather strip */
  .weather-strip {
    background: #145230; color: #c8f0dc; font-size: 10.5px;
    padding: 4px 12px; display: flex; gap: 12px; flex-shrink: 0; flex-wrap: wrap;
  }
  .weather-strip span { display: flex; align-items: center; gap: 3px; }

  /* Layout */
  .layout { display: flex; flex: 1; overflow: hidden; }
  #map { flex: 1; order: 1; min-height: 0; }
  .sidebar {
    width: 340px; order: 2; overflow-y: auto; background: #f0f7f4;
    padding: 10px; flex-shrink: 0; display: flex; flex-direction: column; gap: 8px;
  }

  /* Cards */
  .day-card { background: white; border-radius: 10px; box-shadow: 0 1px 5px rgba(0,50,30,0.1); overflow: hidden; }
  .day-card h3 {
    background: linear-gradient(135deg, #1a5c3a 0%, #2e8b57 100%);
    color: white; padding: 8px 12px; font-size: 12.5px; font-weight: 600;
  }
  .spot-item {
    display: flex; align-items: flex-start; gap: 9px; padding: 9px 12px;
    border-bottom: 1px solid #f0f5f2; cursor: pointer; transition: background 0.15s;
  }
  .spot-item:last-child { border-bottom: none; }
  .spot-item:hover { background: #f5fbf7; }
  .spot-dot {
    width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 11px; font-weight: 700; flex-shrink: 0; margin-top: 1px;
  }
  .spot-info { flex: 1; min-width: 0; }
  .spot-name { font-size: 12.5px; font-weight: 600; color: #1a2e1a; line-height: 1.3; }
  .spot-desc { font-size: 11px; color: #555; margin-top: 2px; line-height: 1.4; display: none; }
  .spot-time {
    font-size: 10px; color: #2e8b57; background: #e8f5ed;
    padding: 1px 6px; border-radius: 8px; margin-top: 4px; display: inline-block; font-weight: 500;
  }
  .spot-tip {
    font-size: 10px; color: #b45309; background: #fef3c7;
    padding: 1px 6px; border-radius: 8px; margin-top: 3px; display: inline-block;
  }
  .itin-transit {
    font-size: 10px; color: #888; padding: 3px 12px 3px 47px;
    border-bottom: 1px dashed #e8f0eb;
  }

  /* Colors */
  .c-forest     { background: #2d6a4f; }
  .c-attraction { background: #e74c3c; }
  .c-food       { background: #e67e22; }
  .c-walk       { background: #27ae60; }
  .c-cafe       { background: #8e44ad; }
  .c-hotel      { background: #2980b9; }

  /* Legend */
  .legend {
    background: rgba(255,255,255,0.92); border-radius: 8px; padding: 7px 10px;
    font-size: 11px; line-height: 1.8; backdrop-filter: blur(4px);
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot  { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

  /* Lang */
  .lang-zh, .lang-en, .lang-ko { display: none; }
  body.zh .lang-zh { display: inline; }
  body.en .lang-en { display: inline; }
  body.ko .lang-ko { display: inline; }
  body.zh .spot-desc.zh { display: block; }
  body.en .spot-desc.en { display: block; }
  body.ko .spot-desc.ko { display: block; }

  /* Mobile */
  @media (max-width: 680px) {

let currentDay = 0;
let map, markers = {}, routeLines = [];

function initMap() {
  map = L.map('map').setView(days[0].center, days[0].zoom);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors', maxZoom: 18
  }).addTo(map);

  const legend = L.control({position:'bottomleft'});
  legend.onAdd = () => {
    const div = L.DomUtil.create('div','legend');
    div.innerHTML = Object.entries(typeColor).map(([t,c]) =>
      `<div class="legend-item"><div class="legend-dot" style="background:${c}"></div>${typeLabelZh[t]}</div>`
    ).join('');
    return div;
  };
  legend.addTo(map);
}

function clearMap() {
  routeLines.forEach(l => map.removeLayer(l));
  routeLines = [];
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
}

function renderDay(dayIdx) {
  clearMap();
  const day = days[dayIdx];
  map.setView(day.center, day.zoom, {animate: true, duration: 0.6});

  const spots = day.spots.filter(s => !s.isTransit);
  let num = 0;
  spots.forEach(s => {
    let html;
    if (s.isHome) {
      html = `<div style="width:30px;height:30px;border-radius:50%;background:#2980b9;border:2px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;font-size:13px;">🏠</div>`;
    } else {
      num++;
      html = `<div style="width:28px;height:28px;border-radius:50%;background:${typeColor[s.type]};border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:12px;">${num}</div>`;
    }
    const icon = L.divIcon({className:'', html, iconSize:[30,30], iconAnchor:[15,15]});
    const m = L.marker([s.lat, s.lng], {icon}).addTo(map);
    m.bindPopup(`<b>${(s.emoji||'🏠')} ${s.nameZh}</b><br>${s.nameEn}<br><small style="color:#2e8b57">${s.time}</small>`);
    markers[s.id] = m;
  });

  // Route line
  const pts = spots.map(s => [s.lat, s.lng]);
  if (pts.length > 1) {
    const col = dayIdx === 0 ? '#2d6a4f' : '#2e8b57';
    const line = L.polyline(pts, {color: col, weight: 2, dashArray:'5,6', opacity:0.55}).addTo(map);
    routeLines.push(line);
  }
}

function renderSidebar(dayIdx) {

  sidebar.innerHTML = '';
  const day = days[dayIdx];
  const card = document.createElement('div');

  const titleZh = day.title.zh, titleEn = day.title.en, titleKo = day.title.ko;
  card.innerHTML = `<h3><span class="lang-zh">${titleZh}</span><span class="lang-en">${titleEn}</span><span class="lang-ko">${titleKo}</span></h3>`;

  let sNum = 0;
  day.spots.forEach(s => {
    if (s.isTransit) {
      const t = document.createElement('div');
      t.className = 'itin-transit';
      t.innerHTML = `<span class="lang-zh">${s.zh}</span><span class="lang-en">${s.en}</span><span class="lang-ko">${s.ko}</span>`;
      card.appendChild(t);
      return;
    }
    const item = document.createElement('div');
    item.className = 'spot-item';
    item.id = `spot-${s.id}`;
    const dotLabel = s.isHome ? '🏠' : ++sNum;
    const dotSize = s.isHome ? '13px' : '11px';
    item.innerHTML = `
      <div class="spot-dot" style="background:${typeColor[s.type]};font-size:${dotSize}">${dotLabel}</div>
      <div class="spot-info">
        <div class="spot-name">
          ${s.isHome ? '' : (s.emoji+' ')}<span class="lang-zh">${s.nameZh}</span><span class="lang-en">${s.nameEn}</span><span class="lang-ko">${s.nameKo}</span>
        </div>
        <div class="spot-desc zh">${s.descZh}</div>
        <div class="spot-desc en">${s.descEn}</div>
        <div class="spot-desc ko">${s.descKo}</div>
        <span class="spot-time">${s.time}</span>
        ${s.tip ? `<br><span class="spot-tip">💡 ${s.tip}</span>` : ''}
      </div>
    `;
    item.addEventListener('click', () => flyTo(s));
    card.appendChild(item);
  });
  sidebar.appendChild(card);
}

function renderWeather(dayIdx) {
  const strip = document.getElementById('weatherStrip');
  strip.innerHTML = weatherData[dayIdx].map(w =>
    `<span>${w.icon} <span class="lang-zh">${w.zh}</span><span class="lang-en">${w.en}</span><span class="lang-ko">${w.ko}</span></span>`
  ).join('');
}

function switchDay(dayIdx) {
  currentDay = dayIdx;
  document.querySelectorAll('.day-tab').forEach((t,i) => t.classList.toggle('active', i===dayIdx));
  renderDay(dayIdx);
  renderSidebar(dayIdx);
  renderWeather(dayIdx);
}

function flyTo(s) {
  map.flyTo([s.lat, s.lng], 16, {duration: 0.8});
  if (markers[s.id]) markers[s.id].openPopup();
  document.querySelectorAll('.spot-item').forEach(el => el.style.background = '');
  const el = document.getElementById(`spot-${s.id}`);
  if (el) { el.style.background = '#e8f5ed'; el.scrollIntoView({behavior:'smooth',block:'nearest'}); }
}

initMap();
switchDay(0);
</script>
</body>
</html>
