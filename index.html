<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏡 孔家旅行计划</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  .container { max-width: 640px; margin: 0 auto; }
  h1 {
    text-align: center;
    font-size: 1.8rem;
    margin-bottom: 0.3rem;
    color: #2d3748;
  }
  .subtitle {
    text-align: center;
    color: #718096;
    font-size: 0.9rem;
    margin-bottom: 2rem;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 1.2rem 1.4rem;
    margin-bottom: 1rem;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 1rem;
    transition: transform 0.15s, box-shadow 0.15s;
    color: inherit;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.12);
  }
  .card-emoji {
    font-size: 2.2rem;
    flex-shrink: 0;
    width: 52px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f7fafc;
    border-radius: 12px;
  }
  .card-body { flex: 1; }
  .card-title {
    font-size: 1.1rem;
    font-weight: 600;
    color: #2d3748;
    margin-bottom: 0.2rem;
  }
  .card-desc {
    font-size: 0.85rem;
    color: #a0aec0;
  }
  .card-arrow {
    color: #cbd5e0;
    font-size: 1.2rem;
    flex-shrink: 0;
  }
  .section-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #a0aec0;
    margin: 1.5rem 0 0.5rem 0.5rem;
    font-weight: 600;
  }
</style>
</head>
<body>
<div class="container">
  <h1>🏡 孔家旅行计划</h1>
  <p class="subtitle">Family Kong Travel Plans</p>

  <div class="section-label">🌏 海外</div>

  <a class="card" href="paris-itinerary.html">
    <div class="card-emoji">🗼</div>
    <div class="card-body">
      <div class="card-title">巴黎亲子游</div>
      <div class="card-desc">孔雀 & 玥玥 · Paris</div>
    </div>
    <div class="card-arrow">›</div>
  </a>

  <div class="section-label">🇨🇳 国内</div>

  <a class="card" href="sanya-itinerary.html">
    <div class="card-emoji">🏖️</div>
    <div class="card-body">
      <div class="card-title">三亚亲子行程</div>
      <div class="card-desc">2026年4月</div>
    </div>
    <div class="card-arrow">›</div>
  </a>

  <a class="card" href="baoding-itinerary.html">
    <div class="card-emoji">🫏</div>
    <div class="card-body">
      <div class="card-title">保定亲子一日游</div>
      <div class="card-desc">Baoding Day Trip</div>
    </div>
    <div class="card-arrow">›</div>
  </a>

  <a class="card" href="guangzhou-food-map.html">
    <div class="card-emoji">🍜</div>
    <div class="card-body">
      <div class="card-title">广州美食地图</div>
      <div class="card-desc">For Amy</div>
    </div>
    <div class="card-arrow">›</div>
  </a>

  <div style="margin-top: 2.5rem; border-top: 1px solid #e2e8f0; padding-top: 1.5rem;">
    <div style="text-align: center; color: #a0aec0; font-size: 0.8rem; margin-bottom: 1rem; letter-spacing: 0.05em;">✅ 已完成</div>
    <a class="card" href="archive.html" style="background: #f7fafc; opacity: 0.75;">
      <div class="card-emoji" style="background: #edf2f7;">📦</div>
      <div class="card-body">
        <div class="card-title" style="color: #718096;">已完成行程 · Archive</div>
        <div class="card-desc">济州岛 · 首尔 · 共 2 个</div>
      </div>
      <div class="card-arrow">›</div>
    </a>
  </div>

</div>
</body>
</html>
