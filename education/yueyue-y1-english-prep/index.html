<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>玥玥 Year 1 English Prep 🌸</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#a8edea 0%,#fed6e3 100%);min-height:100vh;padding:16px}
.app{max-width:440px;margin:0 auto}
.card{background:#fff;border-radius:20px;padding:24px;box-shadow:0 10px 40px rgba(0,0,0,.1);margin-bottom:16px}
h1{font-size:22px;text-align:center;margin-bottom:4px}
.sub{text-align:center;color:#888;font-size:13px;margin-bottom:16px}
.modules{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0}
.mod-btn{padding:16px 8px;border-radius:16px;border:2px solid #eee;background:#fff;cursor:pointer;text-align:center;transition:all .2s;font-size:14px;font-weight:600}
.mod-btn:active{transform:scale(.96)}
.mod-btn.active{border-color:#7C4DFF;background:#F3E8FF}
.mod-btn .icon{font-size:32px;display:block;margin-bottom:6px}
.mod-btn .badge{font-size:11px;color:#999;font-weight:400}
.progress-ring{text-align:center;margin:16px 0}
.progress-ring svg{width:100px;height:100px}
.progress-text{font-size:12px;color:#888;margin-top:4px}
/* Quiz styles */
.quiz-area{display:none}
.q-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.q-count{font-size:13px;color:#999;font-weight:600}
.q-module{font-size:12px;font-weight:600;padding:4px 10px;border-radius:8px}
.pbar{height:5px;background:#eee;border-radius:3px;margin-bottom:16px;overflow:hidden}
.pbar-fill{height:100%;border-radius:3px;transition:width .3s;background:linear-gradient(90deg,#a8edea,#fed6e3)}
.q-card{background:#fafafa;border-radius:16px;padding:16px;border:2px solid transparent;transition:border-color .3s}
.q-card.correct{border-color:#4CAF50;background:#F1F8E9}
.q-card.wrong{border-color:#EF5350;background:#FFEBEE}
.q-instr{font-size:13px;color:#888;margin-bottom:12px;line-height:1.5}
.q-prompt{font-size:20px;font-weight:700;text-align:center;margin-bottom:14px;line-height:1.4}
.q-prompt.img{font-size:48px}
.q-prompt.sent{font-size:16px;font-style:italic}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.opt{padding:12px 8px;border-radius:12px;border:2px solid #e0e0e0;background:#fff;font-size:15px;font-weight:600;cursor:pointer;text-align:center;line-height:1.3;transition:all .2s}
.opt:active{transform:scale(.95)}
.opt.ok{border-color:#4CAF50;background:#E8F5E9;color:#2E7D32}
.opt.no{border-color:#EF5350;background:#FFEBEE;color:#C62828}
.opt:disabled{cursor:default;opacity:.7}
.fb{text-align:center;font-size:22px;margin-top:8px;min-height:28px}
.explain{font-size:12px;color:#777;text-align:center;margin-top:4px;min-height:16px;line-height:1.4}
/* Results */
.results{display:none}
.score-circle{width:110px;height:110px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:16px auto;font-size:32px;font-weight:800;color:#fff}
.score-circle .lbl{font-size:11px;font-weight:400;opacity:.9}
.sc-hi{background:linear-gradient(135deg,#43A047,#66BB6A)}
.sc-md{background:linear-gradient(135deg,#FB8C00,#FFA726)}
.sc-lo{background:linear-gradient(135deg,#E53935,#EF5350)}
.bd{margin:16px 0}
.bd-row{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0f0}
.bd-row:last-child{border:none}
.bd-name{font-size:13px;font-weight:600;min-width:90px}
.bd-bar{flex:1;height:5px;background:#eee;border-radius:3px;margin:0 10px}
.bd-bar-f{height:100%;border-radius:3px}
.bd-sc{font-size:13px}
.tip{background:#FFF8E1;border-radius:12px;padding:12px;margin-top:12px;font-size:12px;line-height:1.6}
.tip b{color:#E65100}
.btn-main{display:block;width:100%;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,#a8edea,#fed6e3);color:#333;font-size:16px;font-weight:700;cursor:pointer;margin-top:12px}
.btn-main:active{transform:scale(.97)}
.hidden{display:none}
.star-row{text-align:center;margin:8px 0;font-size:20px;letter-spacing:4px}
</style>
</head>
<body>
<div class="app">

<!-- HOME -->
<div id="home" class="card">
  <h1>🌸 玥玥英语特训</h1>
  <p class="sub">Year 1 入学准备 · 不上 EAL！</p>
  <div style="text-align:center;font-size:50px;margin:12px 0">🦊</div>
  <div style="font-size:13px;color:#666;line-height:1.7;padding:0 4px">
    <p>这个网站帮玥玥准备 BSB Year 1 入学英语评估。</p>
    <p style="margin-top:8px">评估重点是 <b>词汇量 + 听指令 + 日常表达</b>。</p>
    <p style="margin-top:8px">下面 6 个模块，每个模块 10 道题。可以反复练！</p>
  </div>

  <div class="modules" id="moduleGrid"></div>

  <div id="overallProgress" class="progress-text" style="text-align:center;margin:8px 0;font-size:13px;color:#888"></div>

  <button class="btn-main" onclick="startAll()">🚀 从头开始（全部练习）</button>
  <p style="text-align:center;color:#aaa;font-size:11px;margin-top:8px">💡 点任意模块可单独练习</p>
</div>

<!-- QUIZ -->
<div id="quizScreen" class="card quiz-area">
  <div class="q-header">
    <span class="q-count" id="qCount"></span>
    <span class="q-module" id="qMod"></span>
  </div>
  <div class="pbar"><div class="pbar-fill" id="pFill"></div></div>
  <div id="qArea"></div>
</div>

<!-- RESULTS -->
<div id="resScreen" class="card results"></div>

</div>

<script>
// ============ QUESTION BANK ============
const modules = [
  {
    id: "classroom",
    name: "🏫 Classroom",
    desc: "教室用语",
    color: "#2E7D32",
    bg: "#E8F5E9",
    questions: [
      {instr:"What is this?", prompt:"✏️", pc:"img", opts:["pencil","spoon","key","cup"], ans:0, tip:"A pencil is for writing."},
      {instr:"What is this?", prompt:"📏", pc:"img", opts:["ruler","rope","stick","belt"], ans:0, tip:"A ruler measures things."},
      {instr:"What is this?", prompt:"✂️", pc:"img", opts:["knife","scissors","needle","comb"], ans:1, tip:"Scissors cut paper."},
      {instr:"What is this?", prompt:"📚", pc:"img", opts:["books","boxes","bricks","bags"], ans:0, tip:"We read books."},
      {instr:"What do you say when the teacher gives you something?", prompt:"🎁 → ?", pc:"img", opts:["Sorry!","Thank you!","Hello!","Goodbye!"], ans:1, tip:"Always say 'thank you'!"},
      {instr:"Where do you sit in class?", prompt:"🪑", pc:"img", opts:["on a chair","on the floor","on a table","on a bed"], ans:0, tip:"We sit on chairs in the classroom."},
      {instr:"What does the teacher say to be quiet?", prompt:"🤫", pc:"img", opts:["Stand up!","Shh, be quiet please.","Run!","Eat!"], ans:1, tip:"'Be quiet' means no talking."},
      {instr:"What colour is this?", prompt:"🟡", pc:"img", opts:["red","blue","yellow","green"], ans:2, tip:"Yellow like the sun!"},
      {instr:"Pick the right one:", prompt:"Put your hand ___.", pc:"sent", opts:["up","in","under","behind"], ans:0, tip:"'Put your hand up' means raise your hand."},
      {instr:"What do you use to colour a picture?", prompt:"🖍️ 🎨", pc:"img", opts:["crayons","forks","shoes","coins"], ans:0, tip:"Crayons are for colouring."}
    ]
  },
  {
    id: "body",
    name: "🧍 My Body",
    desc: "身体部位",
    color: "#1565C0",
    bg: "#E3F2FD",
    questions: [
      {instr:"Point to your…", prompt:"👃", pc:"img", opts:["nose","ear","mouth","eye"], ans:0, tip:"Your nose is for smelling."},
      {instr:"What are these?", prompt:"👀", pc:"img", opts:["ears","eyes","lips","teeth"], ans:1, tip:"We see with our eyes."},
      {instr:"What do you hear with?", prompt:"👂👂", pc:"img", opts:["hands","ears","feet","knees"], ans:1, tip:"Ears are for hearing."},
      {instr:"How many fingers on one hand?", prompt:"🖐️", pc:"img", opts:["three","four","five","six"], ans:2, tip:"Five fingers on each hand!"},
      {instr:"Where is your elbow?", prompt:"💪 ← ?", pc:"img", opts:["on your leg","on your arm","on your head","on your foot"], ans:1, tip:"Your elbow bends your arm."},
      {instr:"What do you do with your legs?", prompt:"🦵🦵", pc:"img", opts:["eat","walk and run","read","sing"], ans:1, tip:"Legs help us walk and run."},
      {instr:"What is on top of your head?", prompt:"👤 ← ?", pc:"img", opts:["hair","shoes","gloves","a hat"], ans:0, tip:"Hair grows on your head."},
      {instr:"What do you use to eat?", prompt:"😋 → ?", pc:"img", opts:["your mouth","your ear","your knee","your elbow"], ans:0, tip:"Food goes in your mouth!"},
      {instr:"If your tummy hurts, what do you say?", prompt:"🤢", pc:"img", opts:["I'm happy","My tummy hurts","I'm hungry","I'm sleepy"], ans:1, tip:"Tell the teacher if you feel unwell."},
      {instr:"Which body part do you wave with?", prompt:"👋", pc:"img", opts:["foot","hand","head","shoulder"], ans:1, tip:"We wave with our hands to say hello or goodbye."}
    ]
  },
  {
    id: "animals",
    name: "🐾 Animals",
    desc: "动物词汇",
    color: "#E65100",
    bg: "#FFF3E0",
    questions: [
      {instr:"What animal is this?", prompt:"🐱", pc:"img", opts:["dog","cat","rabbit","mouse"], ans:1, tip:"A cat says 'meow'."},
      {instr:"What animal is this?", prompt:"🐶", pc:"img", opts:["cat","bird","dog","fish"], ans:2, tip:"A dog says 'woof'."},
      {instr:"What animal lives in water?", prompt:"🌊 → ?", pc:"img", opts:["cow","fish","horse","chicken"], ans:1, tip:"Fish live in water."},
      {instr:"What animal has a long neck?", prompt:"🦒", pc:"img", opts:["elephant","giraffe","penguin","bear"], ans:1, tip:"A giraffe has the longest neck!"},
      {instr:"What does a cow say?", prompt:"🐄 → ?", pc:"img", opts:["woof","meow","moo","quack"], ans:2, tip:"Cows say 'moo'."},
      {instr:"Which animal can fly?", prompt:"✈️ → ?", pc:"img", opts:["dog","bird","frog","snake"], ans:1, tip:"Birds have wings and can fly."},
      {instr:"How many legs does a spider have?", prompt:"🕷️", pc:"img", opts:["4","6","8","10"], ans:2, tip:"Spiders have 8 legs."},
      {instr:"Which is the biggest animal?", prompt:"🏆 → ?", pc:"img", opts:["mouse","cat","dog","elephant"], ans:3, tip:"Elephants are the biggest land animals."},
      {instr:"Where does a penguin live?", prompt:"🐧", pc:"img", opts:["in the desert","in the snow/ice","in the jungle","in a house"], ans:1, tip:"Penguins live in very cold places."},
      {instr:"What baby animal comes from an egg?", prompt:"🥚 → ?", pc:"img", opts:["puppy","kitten","chick","calf"], ans:2, tip:"Chicks hatch from eggs!"}
    ]
  },
  {
    id: "food",
    name: "🍎 Food",
    desc: "食物饮料",
    color: "#C62828",
    bg: "#FFEBEE",
    questions: [
      {instr:"What is this fruit?", prompt:"🍌", pc:"img", opts:["apple","banana","orange","grape"], ans:1, tip:"A banana is yellow."},
      {instr:"What is this fruit?", prompt:"🍓", pc:"img", opts:["cherry","strawberry","tomato","raspberry"], ans:1, tip:"Strawberries are red and sweet."},
      {instr:"What do you drink in the morning?", prompt:"🥛", pc:"img", opts:["milk","juice","soup","water"], ans:0, tip:"Milk is good for your bones."},
      {instr:"Which food is a vegetable?", prompt:"🥕", pc:"img", opts:["cake","carrot","chicken","cheese"], ans:1, tip:"Carrots are orange vegetables."},
      {instr:"What meal do you eat at 12 o'clock?", prompt:"🕛 → ?", pc:"img", opts:["breakfast","lunch","dinner","snack"], ans:1, tip:"Lunch is in the middle of the day."},
      {instr:"What do you say if you want water?", prompt:"🥤", pc:"img", opts:["I'm tired","Can I have some water, please?","I don't know","Good morning"], ans:1, tip:"Always say 'please' when you ask."},
      {instr:"Which is a bread food?", prompt:"🍞", pc:"img", opts:["bread","rice","noodles","egg"], ans:0, tip:"Bread is made from flour."},
      {instr:"What is this?", prompt:"🧀", pc:"img", opts:["butter","cheese","cream","yogurt"], ans:1, tip:"Cheese is made from milk."},
      {instr:"What is something sweet you eat after dinner?", prompt:"🍰 → ?", pc:"img", opts:["soup","dessert","salad","rice"], ans:1, tip:"Dessert is the sweet course after a meal."},
      {instr:"Which is NOT a fruit?", prompt:"❌🍎?", pc:"img", opts:["apple","pear","potato","mango"], ans:2, tip:"A potato is a vegetable, not a fruit."}
    ]
  },
  {
    id: "daily",
    name: "🗣️ Daily Talk",
    desc: "日常对话",
    color: "#7B1FA2",
    bg: "#F3E5F5",
    questions: [
      {instr:"When you meet someone, you say:", prompt:"🤝 → ?", pc:"img", opts:["Goodbye!","Hello!","Sorry!","Thank you!"], ans:1, tip:"'Hello' is a greeting."},
      {instr:"If you bump into someone, you say:", prompt:"💥 → ?", pc:"img", opts:["Hello!","Thank you!","Sorry!","Bye!"], ans:2, tip:"Say 'sorry' if you accidentally bump someone."},
      {instr:"How do you ask to go to the toilet?", prompt:"🚽", pc:"img", opts:["I want food","Can I go to the toilet, please?","I'm happy","Sit down please"], ans:1, tip:"Always ask politely!"},
      {instr:"What do you say when you leave school?", prompt:"🏠 ← 🏫", pc:"img", opts:["Good morning!","Goodbye! See you tomorrow!","Thank you!","I'm sorry!"], ans:1, tip:"'Goodbye' and 'see you tomorrow'."},
      {instr:"How do you feel? 😊", prompt:"I feel _____.", pc:"sent", opts:["happy","chair","blue","run"], ans:0, tip:"'Happy' is a feeling word."},
      {instr:"What do you say in the morning?", prompt:"☀️ → ?", pc:"img", opts:["Good night","Good morning","Good afternoon","Goodbye"], ans:1, tip:"Morning = ☀️ just woke up."},
      {instr:"If you don't understand, you say:", prompt:"❓→ ?", pc:"img", opts:["I don't understand","I'm hungry","I'm fine","Thank you"], ans:0, tip:"It's OK to say you don't understand!"},
      {instr:"'How old are you?' — You answer:", prompt:"🎂 5️⃣", pc:"img", opts:["I'm fine","I'm five years old","I like cake","My name is Yueyue"], ans:1, tip:"Answer with 'I'm ___ years old'."},
      {instr:"When someone asks 'What is your name?'", prompt:"👋 → ?", pc:"img", opts:["I'm hungry","My name is Yueyue","I'm five","Good morning"], ans:1, tip:"Answer: 'My name is…'"},
      {instr:"What do you say when you need help?", prompt:"🆘 → ?", pc:"img", opts:["I'm happy","Can you help me, please?","Goodbye","I don't like it"], ans:1, tip:"Ask the teacher: 'Can you help me, please?'"}
    ]
  },
  {
    id: "actions",
    name: "🏃 Actions",
    desc: "动作指令",
    color: "#F57F17",
    bg: "#FFF8E1",
    questions: [
      {instr:"What does 'sit down' mean?", prompt:"🪑⬇️", pc:"img", opts:["Stand up","Sit on the chair","Run","Jump"], ans:1, tip:"'Sit down' = put your bottom on the chair."},
      {instr:"What does 'stand up' mean?", prompt:"🧍⬆️", pc:"img", opts:["Go to sleep","Get on your feet","Sit down","Lie down"], ans:1, tip:"'Stand up' = get on your feet."},
      {instr:"What does 'line up' mean?", prompt:"👫👫👫", pc:"img", opts:["Sit in a circle","Stand in a line","Run around","Lie down"], ans:1, tip:"'Line up' = stand in a queue."},
      {instr:"'Open your book' means:", prompt:"📖 → ?", pc:"img", opts:["Close the book","Open the book to read","Throw the book","Hide the book"], ans:1, tip:"Open = spread it so you can see the pages."},
      {instr:"What does 'clap your hands' mean?", prompt:"👏", pc:"img", opts:["Stamp your feet","Clap hands together","Wave goodbye","Touch your nose"], ans:1, tip:"Clap = hit your hands together!"},
      {instr:"'Wash your hands' — When do you do this?", prompt:"🧼🖐️", pc:"img", opts:["Before eating","Before sleeping","Before reading","Before running"], ans:0, tip:"Wash hands before eating to stay clean."},
      {instr:"What does 'tidy up' mean?", prompt:"🧹", pc:"img", opts:["Make a mess","Put things away neatly","Run outside","Eat lunch"], ans:1, tip:"'Tidy up' = clean and organise."},
      {instr:"The teacher says 'listen carefully'. What should you do?", prompt:"👂✨", pc:"img", opts:["Talk to your friend","Pay attention and listen","Close your eyes","Run away"], ans:1, tip:"'Listen carefully' = pay attention with your ears."},
      {instr:"What does 'share' mean?", prompt:"🍪 → 👧👧", pc:"img", opts:["Keep everything","Give some to others","Hide it","Throw it away"], ans:1, tip:"Sharing means giving some to others."},
      {instr:"'Put on your coat' means:", prompt:"🧥", pc:"img", opts:["Take your coat off","Wear your coat","Wash your coat","Fold your coat"], ans:1, tip:"'Put on' = wear it."}
    ]
  }
];

// ============ STATE ============
let currentModule = null; // null = all, or module index
let questionPool = [];
let currentQ = 0;
let modScores = {};
let modTotals = {};
// Persistent best scores
let bestScores = JSON.parse(localStorage.getItem('yy_best')||'{}');

function saveBest(modId, score, total) {
  const pct = Math.round(score/total*100);
  if (!bestScores[modId] || pct > bestScores[modId]) {
    bestScores[modId] = pct;
    localStorage.setItem('yy_best', JSON.stringify(bestScores));
  }
}

// ============ HOME ============
function renderHome() {
  const grid = document.getElementById('moduleGrid');
  grid.innerHTML = '';
  modules.forEach((m,i) => {
    const best = bestScores[m.id];
    const stars = best >= 90 ? '⭐⭐⭐' : best >= 70 ? '⭐⭐' : best >= 50 ? '⭐' : '';
    const badge = best !== undefined ? `${best}% ${stars}` : 'NEW';
    const div = document.createElement('div');
    div.className = 'mod-btn';
    div.style.borderColor = best >= 90 ? '#4CAF50' : best >= 50 ? '#FFC107' : '#eee';
    div.innerHTML = `<span class="icon">${m.name.split(' ')[0]}</span>${m.name.split(' ').slice(1).join(' ')}<br><span class="badge">${badge}</span>`;
    div.onclick = () => startModule(i);
    grid.appendChild(div);
  });

  // Overall progress
  const totalMods = modules.length;
  const mastered = modules.filter(m => (bestScores[m.id]||0) >= 80).length;
  document.getElementById('overallProgress').innerHTML =
    `已掌握 ${mastered}/${totalMods} 模块` + (mastered === totalMods ? ' 🎉 全部掌握！' : '');
}

// ============ START ============
function startModule(idx) {
  currentModule = idx;
  const m = modules[idx];
  questionPool = shuffle([...m.questions]);
  modScores = {}; modTotals = {};
  modScores[m.id] = 0;
  modTotals[m.id] = questionPool.length;
  currentQ = 0;
  showQuiz();
}

function startAll() {
  currentModule = null;
  questionPool = [];
  modScores = {}; modTotals = {};
  modules.forEach(m => {
    const qs = shuffle([...m.questions]);
    qs.forEach(q => q._modId = m.id);
    questionPool.push(...qs);
    modScores[m.id] = 0;
    modTotals[m.id] = qs.length;
  });
  currentQ = 0;
  showQuiz();
}

function showQuiz() {
  document.getElementById('home').style.display = 'none';
  document.getElementById('resScreen').style.display = 'none';
  const qs = document.getElementById('quizScreen');
  qs.style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  const q = questionPool[currentQ];
  const total = questionPool.length;
  const modId = q._modId || (currentModule !== null ? modules[currentModule].id : '');
  const mod = modules.find(m => m.id === modId) || modules[0];

  document.getElementById('qCount').textContent = `${currentQ+1} / ${total}`;
  document.getElementById('pFill').style.width = `${(currentQ/total)*100}%`;
  const qm = document.getElementById('qMod');
  qm.textContent = mod.name;
  qm.style.background = mod.bg;
  qm.style.color = mod.color;

  let html = `<div class="q-card" id="qCard">`;
  html += `<div class="q-instr">${q.instr}</div>`;
  html += `<div class="q-prompt ${q.pc||''}">${q.prompt}</div>`;
  html += `<div class="opts">`;
  q.opts.forEach((o,i) => {
    html += `<button class="opt" onclick="answer(${i})" id="o${i}">${o}</button>`;
  });
  html += `</div><div class="fb" id="fb"></div><div class="explain" id="ex"></div></div>`;
  document.getElementById('qArea').innerHTML = html;
}

function answer(idx) {
  const q = questionPool[currentQ];
  const modId = q._modId || (currentModule !== null ? modules[currentModule].id : '');
  const ok = idx === q.ans;
  q.opts.forEach((_,i) => document.getElementById(`o${i}`).disabled = true);
  if (ok) {
    document.getElementById(`o${idx}`).classList.add('ok');
    document.getElementById('fb').textContent = '✅ Great job!';
    modScores[modId]++;
  } else {
    document.getElementById(`o${idx}`).classList.add('no');
    document.getElementById(`o${q.ans}`).classList.add('ok');
    document.getElementById('fb').textContent = '❌ Not this time!';
  }
  document.getElementById('ex').textContent = q.tip || '';
  document.getElementById('qCard').classList.add(ok ? 'correct' : 'wrong');

  setTimeout(() => {
    currentQ++;
    if (currentQ < questionPool.length) renderQuestion();
    else showResults();
  }, 1800);
}

// ============ RESULTS ============
function showResults() {
  document.getElementById('quizScreen').style.display = 'none';
  const screen = document.getElementById('resScreen');
  screen.style.display = 'block';

  let totalOk = 0, totalAll = 0;
  Object.keys(modScores).forEach(k => { totalOk += modScores[k]; totalAll += modTotals[k]; });
  const pct = Math.round(totalOk/totalAll*100);
  const sc = pct >= 70 ? 'sc-hi' : pct >= 40 ? 'sc-md' : 'sc-lo';

  // Save best
  if (currentModule !== null) {
    const m = modules[currentModule];
    saveBest(m.id, modScores[m.id], modTotals[m.id]);
  } else {
    modules.forEach(m => saveBest(m.id, modScores[m.id], modTotals[m.id]));
  }

  let lvl, adv;
  if (pct >= 85) { lvl = '🌟 Excellent!'; adv = '非常棒！这个模块已经掌握了，继续保持～'; }
  else if (pct >= 65) { lvl = '💪 Good!'; adv = '不错！再练几次就能完全掌握。'; }
  else if (pct >= 40) { lvl = '📖 Keep Going!'; adv = '有进步！多练几遍，重点看错题的解释。'; }
  else { lvl = '🌱 Let\'s Practice!'; adv = '没关系，多练几次就好了！每天练一点点。'; }

  let stars = pct >= 90 ? '⭐⭐⭐' : pct >= 70 ? '⭐⭐' : pct >= 50 ? '⭐' : '';

  let html = `<h1>🎯 Results</h1>`;
  html += `<div class="score-circle ${sc}"><div>${totalOk}/${totalAll}</div><div class="lbl">${pct}%</div></div>`;
  if (stars) html += `<div class="star-row">${stars}</div>`;
  html += `<p style="text-align:center;font-size:15px;font-weight:600;margin:8px 0">${lvl}</p>`;

  // Module breakdown
  const modIds = Object.keys(modScores);
  if (modIds.length > 1) {
    html += `<div class="bd">`;
    modIds.forEach(id => {
      const m = modules.find(x => x.id === id);
      const s = modScores[id], t = modTotals[id], p = Math.round(s/t*100);
      const st = s===t?' ⭐️':s===0?' ⚠️':'';
      html += `<div class="bd-row"><div class="bd-name">${m.name}</div><div class="bd-bar"><div class="bd-bar-f" style="width:${p}%;background:${m.color}"></div></div><div class="bd-sc">${s}/${t}${st}</div></div>`;
    });
    html += `</div>`;
  }

  html += `<div class="tip"><b>💡 建议</b><br>${adv}</div>`;
  html += `<button class="btn-main" onclick="retry()">🔄 再来一次</button>`;
  html += `<button class="btn-main" style="background:linear-gradient(135deg,#e0e0e0,#f5f5f5);margin-top:8px" onclick="goHome()">🏠 回主页</button>`;
  screen.innerHTML = html;
}

function retry() {
  if (currentModule !== null) startModule(currentModule);
  else startAll();
}

function goHome() {
  document.getElementById('resScreen').style.display = 'none';
  document.getElementById('home').style.display = 'block';
  renderHome();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// Assign modId to questions
modules.forEach(m => m.questions.forEach(q => q._modId = m.id));

renderHome();
</script>
