<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>玥玥 Year 1 English Prep 🌸</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#a8edea 0%,#fed6e3 100%);min-height:100vh;padding:12px}
.app{max-width:440px;margin:0 auto}
.card{background:#fff;border-radius:20px;padding:20px;box-shadow:0 8px 30px rgba(0,0,0,.1);margin-bottom:12px}
h1{font-size:20px;text-align:center;margin-bottom:4px}
.sub{text-align:center;color:#888;font-size:12px;margin-bottom:12px}
/* Module grid */
.modules{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.mod-btn{padding:14px 6px;border-radius:14px;border:2px solid #eee;background:#fff;cursor:pointer;text-align:center;font-size:13px;font-weight:600;transition:all .2s}
.mod-btn:active{transform:scale(.96)}
.mod-btn .icon{font-size:28px;display:block;margin-bottom:4px}
.mod-btn .badge{font-size:10px;color:#999;font-weight:400;display:block;margin-top:2px}
/* Mode selector */
.modes{display:flex;gap:6px;margin:12px 0}
.mode-btn{flex:1;padding:12px 6px;border-radius:12px;border:2px solid #eee;background:#fff;cursor:pointer;text-align:center;font-size:13px;font-weight:600;transition:all .2s}
.mode-btn:active{transform:scale(.96)}
.mode-btn.active{border-color:#7C4DFF;background:#F3E8FF}
.mode-btn .mi{font-size:24px;display:block;margin-bottom:2px}
.mode-btn.locked{opacity:.5;cursor:default}
/* Flashcard */
.fc-container{margin:16px auto;width:280px;min-height:200px;cursor:pointer}
.fc{width:100%;border-radius:20px;padding:20px;text-align:center;transition:all .3s}
.fc-front-mode{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.fc-back-mode{background:#fff;border:2px solid #eee}
.fc-emoji{font-size:64px;margin-bottom:8px}
.fc-word{font-size:28px;font-weight:800;margin-bottom:4px;color:#333}
.fc-cn{font-size:16px;color:#888}
.fc-front-mode .fc-word,.fc-front-mode .fc-cn{display:none}
.fc-front-mode .fc-reveal{display:block}
.fc-back-mode .fc-reveal{display:none}
.fc-reveal{font-size:14px;opacity:.8;margin-top:8px}
.fc-nav{display:flex;justify-content:center;gap:12px;margin-top:12px}
.fc-nav button{padding:10px 24px;border-radius:12px;border:none;font-size:14px;font-weight:600;cursor:pointer}
.fc-prev{background:#eee;color:#666}
.fc-next{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.fc-counter{text-align:center;font-size:12px;color:#999;margin-top:8px}
.fc-hint{text-align:center;font-size:11px;color:#bbb;margin-top:4px}
/* Audio button */
.audio-btn{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;border-radius:20px;border:none;background:#E3F2FD;color:#1565C0;font-size:13px;font-weight:600;cursor:pointer;margin-top:6px}
.audio-btn:active{background:#BBDEFB}
/* Match game */
.match-area{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.match-item{padding:14px 8px;border-radius:14px;border:2px solid #e0e0e0;background:#fff;font-size:16px;font-weight:600;text-align:center;cursor:pointer;transition:all .2s;min-height:52px;display:flex;align-items:center;justify-content:center}
.match-item:active{transform:scale(.96)}
.match-item.selected{border-color:#7C4DFF;background:#F3E8FF}
.match-item.matched{border-color:#4CAF50;background:#E8F5E9;opacity:.6;cursor:default}
.match-item.wrong{border-color:#EF5350;background:#FFEBEE;animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.match-score{text-align:center;font-size:13px;color:#888;margin-top:8px}
/* Quiz styles */
.q-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.q-count{font-size:12px;color:#999;font-weight:600}
.q-mod{font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px}
.pbar{height:4px;background:#eee;border-radius:2px;margin-bottom:12px;overflow:hidden}
.pbar-f{height:100%;border-radius:2px;transition:width .3s;background:linear-gradient(90deg,#a8edea,#fed6e3)}
.q-card{background:#fafafa;border-radius:14px;padding:14px;border:2px solid transparent;transition:border-color .3s}
.q-card.correct{border-color:#4CAF50;background:#F1F8E9}
.q-card.wrong{border-color:#EF5350;background:#FFEBEE}
.q-instr{font-size:12px;color:#888;margin-bottom:10px;line-height:1.5}
.q-prompt{font-size:18px;font-weight:700;text-align:center;margin-bottom:12px;line-height:1.4}
.q-prompt.img{font-size:44px}
.q-prompt.sent{font-size:15px;font-style:italic}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.opt{padding:10px 6px;border-radius:10px;border:2px solid #e0e0e0;background:#fff;font-size:14px;font-weight:600;cursor:pointer;text-align:center;line-height:1.3;transition:all .2s}
.opt:active{transform:scale(.95)}
.opt.ok{border-color:#4CAF50;background:#E8F5E9;color:#2E7D32}
.opt.no{border-color:#EF5350;background:#FFEBEE;color:#C62828}
.opt:disabled{cursor:default;opacity:.7}
.fb{text-align:center;font-size:20px;margin-top:6px;min-height:24px}
.explain{font-size:11px;color:#777;text-align:center;margin-top:4px;min-height:14px;line-height:1.4}
/* Results */
.score-circle{width:100px;height:100px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:12px auto;font-size:28px;font-weight:800;color:#fff}
.score-circle .lbl{font-size:10px;font-weight:400;opacity:.9}
.sc-hi{background:linear-gradient(135deg,#43A047,#66BB6A)}
.sc-md{background:linear-gradient(135deg,#FB8C00,#FFA726)}
.sc-lo{background:linear-gradient(135deg,#E53935,#EF5350)}
.btn-main{display:block;width:100%;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,#a8edea,#fed6e3);color:#333;font-size:15px;font-weight:700;cursor:pointer;margin-top:10px}
.btn-main:active{transform:scale(.97)}
.btn-sec{display:block;width:100%;padding:10px;border-radius:12px;border:none;background:#f0f0f0;color:#666;font-size:14px;font-weight:600;cursor:pointer;margin-top:6px}
.hidden{display:none}
.star-row{text-align:center;font-size:18px;letter-spacing:4px;margin:4px 0}
.bd{margin:12px 0}
.bd-row{display:flex;align-items:center;padding:6px 0;border-bottom:1px solid #f0f0f0}
.bd-row:last-child{border:none}
.bd-name{font-size:12px;font-weight:600;min-width:80px}
.bd-bar{flex:1;height:4px;background:#eee;border-radius:2px;margin:0 8px}
.bd-bar-f{height:100%;border-radius:2px}
.bd-sc{font-size:12px}
.tip{background:#FFF8E1;border-radius:10px;padding:10px;margin-top:10px;font-size:11px;line-height:1.6}
.tip b{color:#E65100}
.back-btn{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:8px;border:none;background:#f0f0f0;color:#666;font-size:12px;font-weight:600;cursor:pointer;margin-bottom:8px}
</style>
</head>
<body>
<div class="app">

<!-- HOME -->
<div id="home" class="card">
  <h1>🌸 玥玥英语特训</h1>
  <p class="sub">Year 1 入学准备 · 先认后练</p>
  <div style="text-align:center;font-size:44px;margin:8px 0">🦊</div>
  <div style="font-size:12px;color:#666;line-height:1.6;padding:0 4px">
    <p>每个模块三步走：</p>
    <p>1️⃣ <b>认一认</b> — 翻卡片学单词</p>
    <p>2️⃣ <b>配一配</b> — 图文连线</p>
    <p>3️⃣ <b>考一考</b> — 选择题测验</p>
  </div>
  <div class="modules" id="moduleGrid"></div>
  <div id="overallProg" style="text-align:center;font-size:12px;color:#888;margin:4px 0"></div>
</div>

<!-- MODULE DETAIL -->
<div id="modDetail" class="card hidden">
  <button class="back-btn" onclick="goHome()">← 返回</button>
  <div id="modTitle" style="font-size:18px;font-weight:700;text-align:center;margin:4px 0"></div>
  <div id="modDesc" style="font-size:12px;color:#888;text-align:center;margin-bottom:12px"></div>
  <div class="modes" id="modeButtons"></div>
</div>

<!-- LEARN (Flashcard) -->
<div id="learnScreen" class="card hidden"></div>

<!-- MATCH -->
<div id="matchScreen" class="card hidden"></div>

<!-- QUIZ -->
<div id="quizScreen" class="card hidden"></div>

<!-- RESULTS -->
<div id="resScreen" class="card hidden"></div>

</div>

      {instr:"'Line up' means:",prompt:"👫👫👫",pc:"img",opts:["Sit in a circle","Stand in a line","Run around","Lie down"],ans:1,tip:"'Line up' = stand in a queue."},
      {instr:"'Open your book' means:",prompt:"📖→?",pc:"img",opts:["Close the book","Open it to read","Throw the book","Hide the book"],ans:1,tip:"Open = spread the pages."},
      {instr:"'Clap your hands' means:",prompt:"👏",pc:"img",opts:["Stamp feet","Clap hands together","Wave bye","Touch nose"],ans:1,tip:"Clap = hit hands together!"},
      {instr:"When do you wash hands?",prompt:"🧼🖐️",pc:"img",opts:["Before eating","Before sleeping","Before reading","Before running"],ans:0,tip:"Wash hands before eating."},
      {instr:"'Listen carefully' means:",prompt:"👂✨",pc:"img",opts:["Talk to friend","Pay attention","Close eyes","Run away"],ans:1,tip:"'Listen carefully' = pay attention."},
      {instr:"'Share' means:",prompt:"🍪→👧👧",pc:"img",opts:["Keep all","Give some to others","Hide it","Throw away"],ans:1,tip:"Sharing = giving some to others."},
      {instr:"'Put on your coat' means:",prompt:"🧥",pc:"img",opts:["Take it off","Wear your coat","Wash it","Fold it"],ans:1,tip:"'Put on' = wear it."},
      {instr:"'Put your hand up' means:",prompt:"🖐️⬆️",pc:"img",opts:["Put hand down","Raise your hand","Clap","Wave goodbye"],ans:1,tip:"Raise hand to answer a question."}
    ]
  }
];
// ============ STATE ============
let curMod = null;
let bestScores = JSON.parse(localStorage.getItem('yy_best2')||'{}');
let learnDone = JSON.parse(localStorage.getItem('yy_learn')||'{}');
let matchDone = JSON.parse(localStorage.getItem('yy_match')||'{}');

function saveBest(id,score,total){const p=Math.round(score/total*100);if(!bestScores[id]||p>bestScores[id]){bestScores[id]=p;localStorage.setItem('yy_best2',JSON.stringify(bestScores))}}
function setLearnDone(id){learnDone[id]=true;localStorage.setItem('yy_learn',JSON.stringify(learnDone))}
function setMatchDone(id){matchDone[id]=true;localStorage.setItem('yy_match',JSON.stringify(matchDone))}

// TTS
function speak(text){if('speechSynthesis' in window){const u=new SpeechSynthesisUtterance(text);u.lang='en-GB';u.rate=0.8;speechSynthesis.cancel();speechSynthesis.speak(u)}}

// Shuffle
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function hideAll(){['home','modDetail','learnScreen','matchScreen','quizScreen','resScreen'].forEach(id=>{const el=document.getElementById(id);el.style.display='none';el.classList.add('hidden')})}
function show(id){const el=document.getElementById(id);el.style.display='block';el.classList.remove('hidden')}

// ============ HOME ============
function renderHome(){
  hideAll();show('home');
  const grid=document.getElementById('moduleGrid');
  grid.innerHTML='';
  modules.forEach((m,i)=>{
    const best=bestScores[m.id];
    const learned=learnDone[m.id];
    const matched=matchDone[m.id];
    let statusText='NEW';
    if(best>=80) statusText='⭐⭐⭐ 掌握';
    else if(best>=50) statusText='⭐ 进行中';
    else if(matched) statusText='✅ 已配对';
    else if(learned) statusText='✅ 已学习';
    const div=document.createElement('div');
    div.className='mod-btn';
    if(best>=80) div.style.borderColor='#4CAF50';
    else if(learned) div.style.borderColor='#FFC107';
    div.innerHTML=`<span class="icon">${m.name.split(' ')[0]}</span>${m.name.split(' ').slice(1).join(' ')}<br><span class="badge">${statusText}</span>`;
    div.onclick=()=>showModDetail(i);
    grid.appendChild(div);
  });
  const mastered=modules.filter(m=>(bestScores[m.id]||0)>=80).length;
  document.getElementById('overallProg').innerHTML=`已掌握 ${mastered}/${modules.length} 模块`+(mastered===modules.length?' 🎉 全部通关！':'');
}
function goHome(){renderHome()}

// ============ MODULE DETAIL ============
function showModDetail(idx){
  curMod=idx;const m=modules[idx];
  hideAll();show('modDetail');
  document.getElementById('modTitle').innerHTML=m.name;
  document.getElementById('modDesc').textContent=m.desc+' · '+m.words.length+'个单词';
  const mb=document.getElementById('modeButtons');
  const learned=learnDone[m.id];
  const matched=matchDone[m.id];
  mb.innerHTML=`
    <div class="mode-btn ${learned?'active':''}" onclick="startLearn(${idx})">
      <span class="mi">🃏</span>认一认${learned?' ✅':''}
    </div>
    <div class="mode-btn ${matched?'active':''}" onclick="startMatch(${idx})">
      <span class="mi">🔗</span>配一配${matched?' ✅':''}
    </div>
    <div class="mode-btn" onclick="startQuiz(${idx})">
      <span class="mi">📝</span>考一考${bestScores[m.id]?` ${bestScores[m.id]}%`:''}
    </div>
  `;
}

// ============ LEARN (Flashcard) ============
let fcIdx=0,fcWords=[];
function startLearn(idx){
  curMod=idx;const m=modules[idx];
  fcIdx=0;fcWords=[...m.words];
  hideAll();show('learnScreen');
  renderFlashcard();
}

function renderFlashcard(){
  const m=modules[curMod];const w=fcWords[fcIdx];
  let html=`<button class="back-btn" onclick="showModDetail(${curMod})">← ${m.name}</button>`;
  html+=`<div class="fc-counter">${fcIdx+1} / ${fcWords.length}</div>`;
  html+=`<div class="fc-container" onclick="flipCard()"><div class="fc fc-front-mode" id="fc">`;
  html+=`<div class="fc-emoji">${w.emoji}</div>`;
  html+=`<div class="fc-word">${w.en}</div><div class="fc-cn">${w.cn}</div>`;
  html+=`<button class="audio-btn" onclick="event.stopPropagation();speak('${w.en}')" style="display:none" id="fcAudio">🔊 听发音</button>`;
  html+=`<div class="fc-reveal">👆 点击看答案</div>`;
  html+=`</div></div>`;
  html+=`<div class="fc-hint"></div>`;
  html+=`<div class="fc-nav">`;
  if(fcIdx>0) html+=`<button class="fc-prev" onclick="fcPrev()">← 上一个</button>`;
  if(fcIdx<fcWords.length-1) html+=`<button class="fc-next" onclick="fcNext()">下一个 →</button>`;
  else html+=`<button class="fc-next" onclick="finishLearn()">✅ 学完了！</button>`;
  html+=`</div>`;
  document.getElementById('learnScreen').innerHTML=html;
}

function flipCard(){const fc=document.getElementById('fc');if(fc.classList.contains('fc-front-mode')){fc.classList.remove('fc-front-mode');fc.classList.add('fc-back-mode');const ab=document.getElementById('fcAudio');if(ab)ab.style.display='inline-flex'}else{fc.classList.remove('fc-back-mode');fc.classList.add('fc-front-mode');const ab=document.getElementById('fcAudio');if(ab)ab.style.display='none'}}
function fcPrev(){if(fcIdx>0){fcIdx--;renderFlashcard()}}
function fcNext(){if(fcIdx<fcWords.length-1){fcIdx++;renderFlashcard()}}
function finishLearn(){
  setLearnDone(modules[curMod].id);
  showModDetail(curMod);
}

// ============ MATCH ============
let matchPairs=[],matchSel=null,matchCount=0,matchTotal=0;
function startMatch(idx){
  curMod=idx;const m=modules[idx];
  // Pick 5 random words for matching
  const picks=shuffle([...m.words]).slice(0,5);
  matchTotal=picks.length;matchCount=0;matchSel=null;
  // Create items: emoji side + word side, shuffled separately
  const emojiItems=shuffle(picks.map((w,i)=>({type:'emoji',display:w.emoji,pairId:i})));
  const wordItems=shuffle(picks.map((w,i)=>({type:'word',display:w.en,pairId:i})));
  matchPairs=[];
  // Interleave: left column emoji, right column words
  for(let i=0;i<5;i++){matchPairs.push(emojiItems[i],wordItems[i])}
  hideAll();show('matchScreen');
  renderMatch(m);
}

function renderMatch(m){
  if(!m) m=modules[curMod];
  let html=`<button class="back-btn" onclick="showModDetail(${curMod})">← ${m.name}</button>`;
  html+=`<div style="text-align:center;font-size:14px;font-weight:600;margin-bottom:8px">🔗 把图片和单词配对</div>`;
  html+=`<div class="match-area">`;
  matchPairs.forEach((item,i)=>{
    const cls=item.matched?'match-item matched':item===matchSel?'match-item selected':'match-item';
    html+=`<div class="${cls}" onclick="matchTap(${i})" id="mi${i}">${item.display}</div>`;
  });
  html+=`</div>`;
  html+=`<div class="match-score">已配对 ${matchCount} / ${matchTotal}</div>`;
  document.getElementById('matchScreen').innerHTML=html;
}

function matchTap(i){
  const item=matchPairs[i];
  if(item.matched) return;
  if(!matchSel){matchSel=item;item._selIdx=i;renderMatch();return}
  if(matchSel===item){matchSel=null;renderMatch();return}
  // Check if different types and same pairId
  if(matchSel.type!==item.type && matchSel.pairId===item.pairId){
    matchSel.matched=true;item.matched=true;matchCount++;matchSel=null;
    renderMatch();
    if(matchCount===matchTotal){
      setTimeout(()=>{setMatchDone(modules[curMod].id);showModDetail(curMod)},800);
    }
  } else {
    // Wrong pair — flash red
    const el1=document.getElementById(`mi${matchSel._selIdx}`);
    const el2=document.getElementById(`mi${i}`);
    if(el1)el1.classList.add('wrong');
    if(el2)el2.classList.add('wrong');
    matchSel=null;
    setTimeout(()=>{renderMatch()},500);
  }
}

// ============ QUIZ ============
let qPool=[],qIdx=0,qScores={},qTotals={};
function startQuiz(idx){
  curMod=idx;const m=modules[idx];
  qPool=shuffle([...m.quiz]);qPool.forEach(q=>q._modId=m.id);
  qIdx=0;qScores={};qTotals={};
  qScores[m.id]=0;qTotals[m.id]=qPool.length;
  hideAll();show('quizScreen');
  renderQ();
}

function renderQ(){
  const q=qPool[qIdx];const total=qPool.length;
  const m=modules.find(x=>x.id===q._modId);
  let html=`<div class="q-header"><span class="q-count">${qIdx+1}/${total}</span><span class="q-mod" style="background:${m.bg};color:${m.color}">${m.name}</span></div>`;
  html+=`<div class="pbar"><div class="pbar-f" style="width:${(qIdx/total)*100}%"></div></div>`;
  html+=`<div class="q-card" id="qCard"><div class="q-instr">${q.instr}</div>`;
  html+=`<div class="q-prompt ${q.pc||''}">${q.prompt}</div><div class="opts">`;
  q.opts.forEach((o,i)=>{html+=`<button class="opt" onclick="qAnswer(${i})" id="qo${i}">${o}</button>`});
  html+=`</div><div class="fb" id="qfb"></div><div class="explain" id="qex"></div></div>`;
  document.getElementById('quizScreen').innerHTML=html;
}

function qAnswer(i){
  const q=qPool[qIdx];const ok=i===q.ans;
  q.opts.forEach((_,j)=>document.getElementById(`qo${j}`).disabled=true);
  if(ok){document.getElementById(`qo${i}`).classList.add('ok');document.getElementById('qfb').textContent='✅ Great!';qScores[q._modId]++}
  else{document.getElementById(`qo${i}`).classList.add('no');document.getElementById(`qo${q.ans}`).classList.add('ok');document.getElementById('qfb').textContent='❌ Oops!'}
  document.getElementById('qex').textContent=q.tip||'';
  document.getElementById('qCard').classList.add(ok?'correct':'wrong');
  setTimeout(()=>{qIdx++;qIdx<qPool.length?renderQ():showRes()},1800);
}

function showRes(){
  hideAll();show('resScreen');
  let ok=0,all=0;Object.keys(qScores).forEach(k=>{ok+=qScores[k];all+=qTotals[k]});
  const pct=Math.round(ok/all*100);const sc=pct>=70?'sc-hi':pct>=40?'sc-md':'sc-lo';
  const m=modules[curMod];saveBest(m.id,ok,all);
  const stars=pct>=90?'⭐⭐⭐':pct>=70?'⭐⭐':pct>=50?'⭐':'';
  let lvl,adv;
  if(pct>=85){lvl='🌟 太棒了！';adv='这个模块已经掌握了！'}
  else if(pct>=65){lvl='💪 不错！';adv='再练几次就完全掌握了。可以回去重新「认一认」复习一下错的单词。'}
  else if(pct>=40){lvl='📖 继续加油！';adv='建议先回去「认一认」再复习一遍，然后「配一配」，再来做题。'}
  else{lvl='🌱 多练几次！';adv='没关系！先回去翻卡片多看几遍，每天看一点，很快就记住了。'}
  let html=`<h1>🎯 Results</h1>`;
  html+=`<div class="score-circle ${sc}"><div>${ok}/${all}</div><div class="lbl">${pct}%</div></div>`;
  if(stars) html+=`<div class="star-row">${stars}</div>`;
  html+=`<p style="text-align:center;font-size:14px;font-weight:600;margin:6px 0">${lvl}</p>`;
  html+=`<div class="tip"><b>💡</b> ${adv}</div>`;
  html+=`<button class="btn-main" onclick="startQuiz(${curMod})">🔄 再做一次</button>`;
  html+=`<button class="btn-sec" onclick="startLearn(${curMod})">🃏 回去认一认</button>`;
  html+=`<button class="btn-sec" onclick="goHome()">🏠 回主页</button>`;
  document.getElementById('resScreen').innerHTML=html;
}

// INIT
renderHome();
</script>
