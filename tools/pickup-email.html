<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Que's Pickup Schedule</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,system-ui,sans-serif;background:#f8f9fa;padding:20px;max-width:500px;margin:0 auto}
.card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
h1{font-size:1.2em;margin-bottom:4px}
.week{color:#888;font-size:.85em;margin-bottom:16px}
.day{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0}
.day:last-of-type{border-bottom:none}
.day-name{font-weight:600;color:#333}
.day-action{color:#666;font-size:.9em}
.day-action.school{color:#2563eb}
.day-action.bus{color:#16a34a}
.day-action.absent{color:#dc2626}
.btn{display:block;text-align:center;background:#2563eb;color:#fff;padding:14px;border-radius:12px;text-decoration:none;font-weight:600;font-size:1em;margin-top:20px}
.btn:active{background:#1d4ed8}
.note{text-align:center;color:#aaa;font-size:.75em;margin-top:12px}
</style>
</head>
<body>
<div class="card">
<h1>📧 Que's Pickup Schedule</h1>
<div class="week" id="week-range"></div>
<div id="schedule"></div>
</div>
<a class="btn" id="mailto-btn" href="#">📨 Send Email to Teachers</a>
<p class="note">Opens your email app with everything pre-filled</p>

<script>
// This file is auto-generated. Update via generate_pickup_page.py
const data = {"weekRange": "Week of 4/20 - 4/24", "days": [{"label": "Mon (4/20)", "action": "Pick up from school", "type": "school"}, {"label": "Tue (4/21)", "action": "School bus, Park Avenue", "type": "bus"}, {"label": "Wed (4/22)", "action": "Pick up from school", "type": "school"}, {"label": "Thu (4/23)", "action": "Pick up from school", "type": "school"}, {"label": "Fri (4/24)", "action": "Absent (a panda camp)", "type": "absent"}], "mailto": "mailto:annelize.engelbrecht@bsbsanlitun.com,sltbus@bsbsanlitun.com?subject=Que%27s%20schedule%20for%20the%20upcoming%20week%20%284/20%20-%204/24%29&body=Dear%20Miss%20E%20and%20Emma%2C%0D%0A%0D%0AI%20hope%20you%20had%20a%20great%20weekend.%0D%0A%0D%0AI%20want%20to%20update%20you%20of%20the%20schedule%20arrangements%20for%20Que%20for%20next%20week%3A%0D%0A%0D%0A%E2%80%A2%20Mon%20%284/20%29%3A%20Pick%20up%20from%20school%0D%0A%E2%80%A2%20Tue%20%284/21%29%3A%20School%20bus%2C%20Park%20Avenue%20stop%0D%0A%E2%80%A2%20Wed%20%284/22%29%3A%20Pick%20up%20from%20school%0D%0A%E2%80%A2%20Thu%20%284/23%29%3A%20Pick%20up%20from%20school%0D%0A%E2%80%A2%20Fri%20%284/24%29%3A%20Absent%20%28a%20panda%20camp%29%0D%0A%0D%0AThank%20you%20for%20your%20assistance.%0D%0A%0D%0ABest%20regards%2C%0D%0A%0D%0AAmy"};

document.getElementById('week-range').textContent = data.weekRange;

const container = document.getElementById('schedule');
const classMap = {school:'school', bus:'bus', absent:'absent'};
data.days.forEach(d => {
  const div = document.createElement('div');
  div.className = 'day';
  div.innerHTML = `<span class="day-name">${d.label}</span><span class="day-action ${classMap[d.type]||''}">${d.action}</span>`;
  container.appendChild(div);
});

document.getElementById('mailto-btn').href = data.mailto;
</script>
</body>
</html>
