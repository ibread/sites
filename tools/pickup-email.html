<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Que's Pickup Schedule</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,system-ui,sans-serif;background:#f8f9fa;padding:20px;max-width:500px;margin:0 auto}
.card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
h1{font-size:1.2em;margin-bottom:4px}
.week{color:#888;font-size:.85em;margin-bottom:16px}
.day{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0}
.day:last-of-type{border-bottom:none}
.day-name{font-weight:600;color:#333}
.day-action{color:#666;font-size:.9em}
.day-action.school{color:#2563eb}
.day-action.bus{color:#16a34a}
.day-action.absent{color:#dc2626}
.btn{display:block;text-align:center;color:#fff;padding:14px;border-radius:12px;text-decoration:none;font-weight:600;font-size:1em;margin-top:12px}
.btn-mailto{background:#2563eb}
.btn-mailto:active{background:#1d4ed8}
.note{text-align:center;color:#aaa;font-size:.75em;margin-top:12px}
</style>
</head>
<body>
<div class="card">
<h1>📧 Que's Pickup Schedule</h1>
<div class="week" id="week-range"></div>
<div id="schedule"></div>
</div>
<a class="btn btn-mailto" id="mailto-btn" href="#">📨 Send Email to Teachers</a>

</html>
