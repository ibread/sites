<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧪 OpenClaw Sites Demo</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'PingFang SC', sans-serif; background: #f5f7fa; padding: 40px 20px; }
.container { max-width: 800px; margin: 0 auto; }
h1 { text-align: center; margin-bottom: 10px; color: #333; font-size: 24px; }
.subtitle { text-align: center; color: #666; margin-bottom: 40px; font-size: 14px; }

.demo-list { display: grid; gap: 20px; }
.demo-card {
  background: white; border-radius: 12px; padding: 24px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  transition: transform 0.2s, box-shadow 0.2s;
  text-decoration: none; color: inherit;
  display: block;
}
.demo-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(0,0,0,0.12);
}
.demo-card h2 { font-size: 18px; color: #1a365d; margin-bottom: 8px; }
.demo-card p { font-size: 14px; color: #666; line-height: 1.6; }
.demo-card .tags { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
.demo-card .tag {
  font-size: 11px; padding: 3px 8px; border-radius: 12px;
  background: #e0e7ff; color: #1a365d; font-weight: 500;
}
.demo-card .tag.design { background: #fee2e2; color: #991b1b; }
.demo-card .tag.color { background: #dcfce7; color: #166534; }
.demo-card .tag.ui { background: #fef3c7; color: #92400e; }
</style>
</head>
<body>
<div class="container">
  <h1>🧪 OpenClaw Sites Demo</h1>
  <p class="subtitle">行程地图生成器的测试页面和示例</p>
  
  <div class="demo-list">
    <a href="marker-color-test.html" class="demo-card">
      <h2>🎨 Marker 颜色测试</h2>
      <p>测试餐厅 marker 的不同背景色方案，包含 23 个吃饭相关 emoji 和 5 种颜色对比。</p>
      <div class="tags">
        <span class="tag color">颜色</span>
        <span class="tag design">设计</span>
        <span class="tag">2026-04-09</span>
      </div>
    </a>

        <span class="tag">日期</span>

</div>
