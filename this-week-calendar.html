<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>本周日程 4/6 - 4/12</title>
<style>
@page { size: A4; margin: 15mm; }
body { font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif; margin: 0; padding: 20px; background: white; color: #333; }
h1 { text-align: center; font-size: 26px; margin-bottom: 5px; color: #2c3e50; }
.subtitle { text-align: center; font-size: 14px; color: #7f8c8d; margin-bottom: 20px; }
.week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0; border: 2px solid #34495e; border-radius: 8px; overflow: hidden; }
.day-header { background: #34495e; color: white; text-align: center; padding: 8px 4px; font-weight: 600; font-size: 13px; }
.day-header.weekend { background: #8e44ad; }
.day-header.today { background: #e74c3c; }
.day-cell { min-height: 120px; border: 1px solid #ddd; padding: 6px; font-size: 12px; vertical-align: top; }
.day-cell.weekend { background: #fdf2f8; }
.day-cell.today { background: #fef3cd; }
.date-num { font-weight: 700; font-size: 16px; margin-bottom: 6px; color: #2c3e50; }
.event { margin-bottom: 6px; padding: 4px 6px; border-radius: 4px; font-size: 11px; line-height: 1.4; }
.event-kongque { background: #dbeafe; border-left: 3px solid #3b82f6; }
.event-yueyue { background: #fce7f3; border-left: 3px solid #ec4899; }
.event-both { background: #f0fdf4; border-left: 3px solid #22c55e; }
.event-family { background: #fef9c3; border-left: 3px solid #eab308; }
.event-time { font-size: 10px; color: #6b7280; }
.event-title { font-weight: 600; }
.legend { display: flex; gap: 16px; justify-content: center; margin-top: 15px; font-size: 12px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-dot { width: 12px; height: 12px; border-radius: 3px; }
.allday-banner { background: #e8f5e9; border: 1px dashed #4caf50; padding: 3px 6px; border-radius: 4px; font-size: 11px; margin-bottom: 4px; text-align: center; color: #2e7d32; font-weight: 600; }
.print-btn { display: block; margin: 20px auto; padding: 10px 30px; background: #3b82f6; color: white; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
.print-btn:hover { background: #2563eb; }
@media print { .print-btn { display: none; } }
</style>
</head>
<body>
