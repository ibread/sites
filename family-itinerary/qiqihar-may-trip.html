<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>齐齐哈尔五一行程 Qiqihar May Trip</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f7f5f0}
header{background:linear-gradient(rgba(26,54,93,0.7),rgba(26,54,93,0.85)),url('https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=800&q=80');background-size:cover;background-position:center 30%;color:#fff;padding:16px 14px 12px}
header h1{font-size:18px;font-weight:700;text-shadow:0 1px 4px rgba(0,0,0,0.5)}
header .sub{font-size:12px;opacity:0.85;margin-top:3px}
.tabs{display:flex;gap:6px;padding:10px 12px;background:#fff8ee;border-bottom:1px solid #e0e0e0;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 16px;border-radius:20px;font-size:13px;cursor:pointer;white-space:nowrap;border:1px solid #ddd;background:#fff;color:#333;transition:.2s}
.tab.active{background:#1a365d;color:#fff;border-color:#1a365d;font-weight:600;border-bottom:3px solid #d4a843}
.layout{display:flex;flex-direction:column;height:calc(100vh - 120px)}
#map{flex:1;min-height:200px}
.sidebar{overflow-y:auto;padding:10px;background:#fff}
.spot-item{display:flex;gap:10px;padding:12px;border-bottom:1px solid #eee;cursor:pointer;transition:background .15s}
.spot-item:hover{background:#f9f9f9}
.spot-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;margin-top:3px}
.spot-body{flex:1}
.spot-name{font-weight:600;font-size:14px;color:#1a365d}
.spot-time{font-size:12px;color:#666;margin-top:2px}
.spot-desc{font-size:13px;color:#555;margin-top:4px;line-height:1.4}
.legend{position:absolute;bottom:10px;left:10px;background:rgba(255,255,255,0.95);padding:8px 12px;border-radius:8px;font-size:11px;box-shadow:0 2px 8px rgba(0,0,0,0.15);z-index:1000}
.legend-title{font-weight:600;margin-bottom:4px;color:#1a365d}
.legend-item{display:flex;align-items:center;gap:6px;margin:3px 0}
.legend-color{width:10px;height:10px;border-radius:50%}
.transit-label{background:rgba(255,255,255,0.93);border:1px solid #bbb;border-radius:10px;padding:2px 8px;font-size:11px;font-weight:600;color:#555;white-space:nowrap;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.permanent-popup .leaflet-popup-content-wrapper{background:#fff;color:#222;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.15);padding:0}
.permanent-popup .leaflet-popup-content{margin:5px 10px;font-size:12px;font-weight:600;white-space:nowrap}
.permanent-popup .leaflet-popup-tip{border-top-color:#fff}
.permanent-popup .leaflet-popup-close-button{display:none}
@media(min-width:680px){
  .layout{flex-direction:row}
  #map{order:1;flex:1}
  .sidebar{order:2;width:360px;max-height:calc(100vh - 120px)}
}
@media(max-width:679px){
  .sidebar{max-height:40vh;order:1}
  #map{order:2}
}
</style>
</head>
<body>
<header>
  <h1>🦩 齐齐哈尔五一行程</h1>
  <div class="sub">5/2-5/4 · 丹顶鹤之乡 · 烧烤之都</div>
</header>

<div class="tabs" id="tabs">
  <div class="tab active" data-day="all">全部</div>
  <div class="tab" data-day="day1">5.2</div>
  <div class="tab" data-day="day2">5.3</div>
  <div class="tab" data-day="day3">5.4</div>
</div>

<div class="layout">
  <div id="map"></div>
  <div class="sidebar" id="sidebar"></div>
</div>

<div class="legend">
  <div class="legend-title">图例</div>
  <div class="legend-item"><div class="legend-color" style="background:#e74c3c"></div>景点</div>
  <div class="legend-item"><div class="legend-color" style="background:#e67e22"></div>美食</div>
  <div class="legend-item"><div class="legend-color" style="background:#2980b9"></div>酒店</div>
  <div class="legend-item"><div class="legend-color" style="background:#7f8c8d"></div>交通</div>
</div>

<script>
const COLORS={attraction:'#e74c3c',food:'#e67e22',hotel:'#2980b9',transport:'#7f8c8d',kids:'#27ae60'};
const EMOJIS={attraction:'🏛️',food:'🍜',hotel:'🏨',transport:'🚉',kids:'🦁'};

const hotel={name:'全季酒店（金融街店）',lat:47.3580,lng:123.9600,desc:'建华区嘉禾国际小区29号楼'};

const spots=[
  {id:'d1-1',day:'day1',name:'十二忠手拉面',lat:47.3560,lng:123.9520,time:'12:00',type:'food',desc:'牛骨浓汤手拉面'},
  {id:'d1-2',day:'day1',name:'扎龙自然保护区',lat:47.2124,lng:124.2510,time:'13:30-16:30',type:'attraction',desc:'丹顶鹤放飞 14:00/15:30'},
  {id:'d1-3',day:'day1',name:'龙沙夜市',lat:47.3400,lng:123.9500,time:'17:30',type:'food',desc:'烧烤小吃夜市'},
  
  {id:'d2-1',day:'day2',name:'龙沙早市',lat:47.3430,lng:123.9510,time:'7:30',type:'food',desc:'本地早餐集市'},
  {id:'d2-2',day:'day2',name:'龙沙动植物园',lat:47.3900,lng:123.9350,time:'9:00-12:00',type:'kids',desc:'东北最大，花车巡游+泡泡派对'},
  {id:'d2-3',day:'day2',name:'米家烤肉（总店）',lat:47.3580,lng:123.9480,time:'12:30',type:'food',desc:'齐齐哈尔烤肉代表，清真'},
  {id:'d2-4',day:'day2',name:'北极冷饮厅',lat:47.3440,lng:123.9530,time:'14:00',type:'food',desc:'老字号冰淇淋'},
  {id:'d2-5',day:'day2',name:'圣弥勒尔天主教堂',lat:47.3410,lng:123.9580,time:'14:30',type:'attraction',desc:'最大天主教堂'},
  {id:'d2-6',day:'day2',name:'中环广场',lat:47.3390,lng:123.9560,time:'15:00-16:30',type:'shopping',desc:'核心商圈步行街'},
  {id:'d2-7',day:'day2',name:'顺玉大片肉（劳动桥店）',lat:47.3400,lng:123.9490,time:'18:00',type:'food',desc:'朝鲜族烤肉+冷面'},
  
  {id:'d3-1',day:'day3',name:'飞鹤牧场（观光）',lat:47.2800,lng:124.1000,time:'8:30-11:00',type:'attraction',desc:'DIY 奶制品，齐扎公路 12 公里'},
  {id:'d3-2',day:'day3',name:'付胖子鸡骨架大串',lat:47.3450,lng:123.9560,time:'11:30',type:'food',desc:'必点宫后夹肉'},
  {id:'d3-3',day:'day3',name:'齐齐哈尔站',lat:47.3280,lng:123.9650,time:'15:30',type:'transport',desc:'火车站返程'}
];

const transits=[
  {day:'day1',from:spots[0],to:spots[1],time:35},
  {day:'day1',from:spots[1],to:spots[2],time:40},
  {day:'day2',from:spots[3],to:spots[4],time:12},
  {day:'day2',from:spots[4],to:spots[5],time:10},
  {day:'day2',from:spots[5],to:spots[6],time:5},
  {day:'day2',from:spots[6],to:spots[7],time:3},
  {day:'day2',from:spots[7],to:spots[8],time:2},
  {day:'day2',from:spots[8],to:spots[9],time:3},
  {day:'day3',from:spots[10],to:spots[11],time:25},
  {day:'day3',from:spots[11],to:spots[12],time:10}
];

let map,currentLayerGroup,polylineGroup,labelsGroup,activeDay='all';

function initMap(){
  map=L.map('map',{zoomControl:false}).setView([47.35,123.96],11);
  L.control.zoom({position:'bottomright'}).addTo(map);
  
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
    attribution:'©OpenStreetMap ©CartoDB',
    maxZoom:19
  }).addTo(map);
  
  currentLayerGroup=L.layerGroup().addTo(map);
  polylineGroup=L.layerGroup().addTo(map);
  labelsGroup=L.layerGroup().addTo(map);
  
  renderDay('all');
}

function createIcon(type){
  const color=COLORS[type]||'#999';
  const emoji=EMOJIS[type]||'📍';
  return L.divIcon({
    className:'',
    html:`<div style="background:${color};width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.3);font-size:14px">${emoji}</div>`,
    iconSize:[28,28],
    iconAnchor:[14,14]
  });
}

function renderSpots(day){
  const sidebar=document.getElementById('sidebar');
  sidebar.innerHTML='';
  
  const hotelCard=document.createElement('div');
  hotelCard.className='spot-item';
  hotelCard.innerHTML=`
    <div class="spot-dot" style="background:${COLORS.hotel}"></div>
    <div class="spot-body">
      <div class="spot-name">🏨 ${hotel.name}</div>
      <div class="spot-desc">${hotel.desc}</div>
    </div>
  `;
  hotelCard.onclick=()=>{map.flyTo([hotel.lat,hotel.lng],14);openPopup(hotel,'hotel');};
  sidebar.appendChild(hotelCard);
  
  const filtered=day==='all'?spots:spots.filter(s=>s.day===day);
  
  const isMobileList=window.innerWidth<680;
  const listSpots=isMobileList&&day!=='all'?filtered.slice(0,3):filtered;
  listSpots.forEach(spot=>{
    const item=document.createElement('div');
    item.className='spot-item';
    const typeColor=COLORS[spot.type]||'#999';
    item.innerHTML=`
      <div class="spot-dot" style="background:${typeColor}"></div>
      <div class="spot-body">
        <div class="spot-name">${EMOJIS[spot.type]||'📍'} ${spot.name}</div>
        <div class="spot-time">⏰ ${spot.time}</div>
        <div class="spot-desc">${spot.desc}</div>
      </div>
    `;
    item.onclick=()=>{map.flyTo([spot.lat,spot.lng],14);openPopup(spot,spot.type);};
    sidebar.appendChild(item);
  });
}

function renderMarkers(day){
  currentLayerGroup.clearLayers();
  polylineGroup.clearLayers();
  labelsGroup.clearLayers();
  
  L.marker([hotel.lat,hotel.lng],{icon:createIcon('hotel')}).addTo(currentLayerGroup);
  L.popup({autoClose:false,closeOnClick:false,closeButton:false,className:'permanent-popup',offset:[0,-6]})
    .setLatLng([hotel.lat,hotel.lng]).setContent(hotel.name).addTo(currentLayerGroup);
  
  const filtered=day==='all'?spots:spots.filter(s=>s.day===day);
  
  // On mobile, limit permanent popups to 3 per day (priority: hotel>attraction>kids>food>transport>shopping)
  const isMobile=window.innerWidth<680;
  const typePriority={hotel:0,attraction:1,kids:2,food:3,transport:4,shopping:5};
  let popupSpots=filtered;
  if(isMobile){
    const days=[...new Set(filtered.map(s=>s.day))];
    const popupSet=new Set();
    days.forEach(d=>{
      const daySpots=filtered.filter(s=>s.day===d)
        .slice().sort((a,b)=>(typePriority[a.type]||9)-(typePriority[b.type]||9));
      daySpots.slice(0,3).forEach(s=>popupSet.add(s.id));
    });
    popupSpots=filtered.filter(s=>popupSet.has(s.id));
  }
  
  filtered.forEach(spot=>{
    L.marker([spot.lat,spot.lng],{icon:createIcon(spot.type)}).addTo(currentLayerGroup);
    if(!isMobile||popupSpots.includes(spot)){
      L.popup({autoClose:false,closeOnClick:false,closeButton:false,className:'permanent-popup',offset:[0,-6]})
        .setLatLng([spot.lat,spot.lng]).setContent(spot.name).addTo(currentLayerGroup);
    }
  });
  
  if(day!=='all'){
    const daySpots=spots.filter(s=>s.day===day);
    for(let i=0;i<daySpots.length-1;i++){
      drawTransit(daySpots[i],daySpots[i+1],transits.find(t=>t.from===daySpots[i]&&t.to===daySpots[i+1])?.time||'');
    }
  }
}

function drawTransit(from,to,time){
  const coords=[[from.lat,from.lng],[to.lat,to.lng]];
  const polyline=L.polyline(coords,{color:'#1a365d',weight:2,opacity:0.5,dashArray:'6,8'}).addTo(polylineGroup);
  
  if(time){
    const midLat=(from.lat+to.lat)/2;
    const midLng=(from.lng+to.lng)/2;
    const labelIcon=L.divIcon({
      className:'',
      html:`<div class="transit-label">🚗 ${time} 分钟</div>`,
      iconAnchor:[40,10]
    });
    L.marker([midLat,midLng],{icon:labelIcon,interactive:false}).addTo(labelsGroup);
  }
}

function openPopup(spot,type){
  currentLayerGroup.eachLayer(layer=>{
    if(layer.getLatLng&&layer.getLatLng().lat===spot.lat&&layer.getLatLng().lng===spot.lng){
      layer.openPopup();
    }
  });
}

function renderDay(day){
  activeDay=day;
  document.querySelectorAll('.tab').forEach(t=>{
    t.classList.toggle('active',t.dataset.day===day);
  });
  renderSpots(day);
  renderMarkers(day);
  
  if(day==='all'){
    map.fitBounds(L.latLngBounds([hotel.lat,hotel.lng],...spots.map(s=>[s.lat,s.lng])),{padding:[50,50]});
  }else{
    const daySpots=spots.filter(s=>s.day===day);
    if(daySpots.length>0){
      map.fitBounds(L.latLngBounds([hotel.lat,hotel.lng],...daySpots.map(s=>[s.lat,s.lng])),{padding:[50,50]});
    }
  }
}

document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>renderDay(tab.dataset.day));
});

initMap();
</script>
</body>
</html>
