<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>保定亲子一日游 🫏</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--primary:#d35400;--bg:#faf8f5;--card:#fff;--text:#333;--muted:#888;--accent:#e74c3c}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100dvh;overflow:hidden}
header{background:linear-gradient(135deg,#d35400,#e67e22);color:#fff;padding:14px 16px;text-align:center;flex-shrink:0}
header h1{font-size:20px;font-weight:700}
header p{font-size:12px;opacity:.85;margin-top:2px}
.home-btn{position:absolute;top:12px;right:14px;background:rgba(255,255,255,.25);color:#fff;padding:4px 10px;border-radius:14px;font-size:11px;text-decoration:none;font-weight:600}
.home-btn:hover{background:rgba(255,255,255,.4)}
.tabs{display:flex;gap:0;overflow-x:auto;flex-shrink:0;background:#fff;border-bottom:1px solid #eee;-webkit-overflow-scrolling:touch}
.tabs button{flex-shrink:0;padding:10px 14px;border:none;background:none;font-size:13px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.tabs button.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
#map{flex:1;min-height:200px}
.sidebar{max-height:38dvh;overflow-y:auto;flex-shrink:0;padding:8px 12px 80px;-webkit-overflow-scrolling:touch}
.sidebar.fullscreen{max-height:100dvh;flex:1 1 auto}
.card{background:var(--card);border-radius:10px;padding:12px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.06);cursor:pointer;transition:box-shadow .15s}
.card:active,.card.highlight{box-shadow:0 0 0 2px var(--primary),0 2px 8px rgba(0,0,0,.1)}
.card-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.card-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;color:#fff}
.card-title{font-size:15px;font-weight:600}
.card-time{font-size:12px;color:var(--accent);font-weight:600;margin-bottom:4px}
.card-desc{font-size:13px;color:#555;line-height:1.5}
.card-tag{display:inline-block;border-radius:4px;padding:1px 6px;font-size:11px;margin:4px 4px 0 0}
.card-tag.red{background:#fce4ec;color:#c62828}
.card-tag.green{background:#e8f5e9;color:#2e7d32}
.card-tag.blue{background:#e3f2fd;color:#1565c0}
.card-tag.orange{background:#fff3e0;color:#e65100}
.card-warn{font-size:12px;color:#e74c3c;margin-top:4px}
.section-title{font-size:14px;font-weight:700;color:var(--primary);margin:12px 0 6px;padding-left:4px}
.checklist-item{font-size:13px;padding:6px 0;border-bottom:1px solid #f0f0f0;line-height:1.5}
@media(min-width:769px){
  body{flex-direction:row}
  .sidebar{width:380px;max-height:100dvh;border-right:1px solid #eee}
  .sidebar.fullscreen{width:380px}
  #map{flex:1}
  header{display:none}
}
</style>
</head>
<body>
<header style="position:relative">
  <a href="https://ibread.github.io/sites/index.html" class="home-btn" style="position:absolute;top:12px;right:14px;background:rgba(255,255,255,.25);color:#fff;padding:4px 10px;border-radius:14px;font-size:11px;text-decoration:none;font-weight:600">🏠 首页</a>
  <h1>🫏 保定亲子一日游</h1>
  <p>清明 4/4-6 · 高铁41分钟 · 约¥1200/4人</p>
</header>
<div class="tabs" id="tabs">
  <button onclick="selectTab(0)" class="active">🚄 行程</button>
  <button onclick="selectTab(1)">🔥 驴火推荐</button>
  <button onclick="selectTab(2)">🏛️ 其他景点</button>
  <button onclick="selectTab(3)">📋 清单</button>
</div>
<div class="sidebar" id="sidebar"></div>
<div id="map"></div>

<script>
const map = L.map('map',{zoomControl:false}).setView([38.885,115.500],13);
L.control.zoom({position:'topright'}).addTo(map);
L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}',{
  attribution:'© 高德地图',maxZoom:18,subdomains:'1234'
}).addTo(map);

function labelIcon(emoji,label,color){
  return L.divIcon({
    html:`<div style="display:flex;flex-direction:column;align-items:center;pointer-events:auto">
      <span style="font-size:30px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.3))">${emoji}</span>
      <span style="font-size:11px;font-weight:700;color:#fff;background:${color};padding:1px 5px;border-radius:3px;white-space:nowrap;margin-top:-2px;box-shadow:0 1px 3px rgba(0,0,0,.3)">${label}</span>
    </div>`,
    iconSize:[100,50],iconAnchor:[50,45],popupAnchor:[0,-45],className:''
  });
}

// 所有地点数据
const places = {
  // 行程（飞书文档）
  station_bd: {lat:38.853,lng:115.558,emoji:'🚄',label:'保定东站',color:'#7f8c8d',group:'itinerary',popup:'保定东站<br>高铁41分钟到北京西'},
  greenvalley: {lat:38.905,lng:115.455,emoji:'🎢',label:'绿溪谷乐园',color:'#27ae60',group:'itinerary',popup:'绿溪谷乐园<br>📍 阳光北大街2121号（植物园西北角）<br>🎫 约¥99/人<br>⏰ 9:00-12:00'},
  yanjia:      {lat:38.8935,lng:115.4785,emoji:'🔥',label:'闫家驴肉(华电)',color:'#e74c3c',group:'itinerary',popup:'闫家驴肉老店（华电一校店）<br>📍 青年路华电对面<br>💰 人均20-30元<br>⏰ 12:30-13:30'},
  museum:      {lat:38.875,lng:115.535,emoji:'🦕',label:'古动物馆',color:'#8e44ad',group:'itinerary',popup:'中国古动物馆（保定自然博物馆）<br>📍 东三环与东风东路交叉口东南角<br>🎫 大人40元，孩子免费<br>⏰ 14:00-16:00'},

  // 驴火推荐
  yongmao:  {lat:38.878,lng:115.456,emoji:'🔥',label:'永茂(创始店)',color:'#e74c3c',group:'donkey',popup:'永茂驴肉火烧（永华北大街创始店）<br>20年老牌，建议上午去'},
  caowu:    {lat:38.886,lng:115.491,emoji:'🔥',label:'曹老五',color:'#e74c3c',group:'donkey',popup:'土桥曹家驴肉火烧（曹老五）<br>"保定最好吃"，老饕级'},
  laowang:  {lat:38.870,lng:115.470,emoji:'🔥',label:'老王馄饨面',color:'#e74c3c',group:'donkey',popup:'老王驴肉馄饨面<br>小红书本地人推荐"仅此一家"'},
  haozw:    {lat:38.870,lng:115.465,emoji:'🫏',label:'好滋味',color:'#f39c12',group:'donkey',popup:'好滋味（南大街总店）<br>保定最大连锁，环境好适合带娃'},
  laolvtou: {lat:38.882,lng:115.478,emoji:'🫏',label:'老驴头',color:'#f39c12',group:'donkey',popup:'老驴头（军校广场店）<br>名气最大连锁品牌'},
  yuanjia:  {lat:38.868,lng:115.458,emoji:'🫏',label:'袁家',color:'#f39c12',group:'donkey',popup:'袁家驴肉火烧<br>清末老店，吴佩孚最爱'},
  sujia:    {lat:38.876,lng:115.453,emoji:'🫏',label:'苏家金饼',color:'#f39c12',group:'donkey',popup:'苏家金饼<br>独制金饼火烧，更酥脆'},
  fanjia:   {lat:38.869,lng:115.470,emoji:'🫏',label:'范家',color:'#f39c12',group:'donkey',popup:'老字号范家驴肉火烧'},

  // 其他景点
  zhili:    {lat:38.8745,lng:115.4688,emoji:'🏛️',label:'直隶总督署',color:'#2c3e50',group:'scenic',popup:'直隶总督署<br>全国唯一保存完好的清代省级衙署<br>🎫 约¥30'},
  lotus:    {lat:38.8772,lng:115.4625,emoji:'🪷',label:'古莲花池',color:'#27ae60',group:'scenic',popup:'古莲花池<br>中国十大园林之一<br>🎫 约¥30'},
  daci:     {lat:38.881,lng:115.4615,emoji:'🛕',label:'大慈阁',color:'#8e44ad',group:'scenic',popup:'大慈阁<br>保定地标，登高看全城'},
};

// 创建所有 markers
const markers = {};
for(const[k,p] of Object.entries(places)){
  const m = L.marker([p.lat,p.lng],{icon:labelIcon(p.emoji,p.label,p.color)}).bindPopup(`<b>${p.popup}</b>`,{maxWidth:260});
  m._group = p.group;
  m._key = k;
  markers[k] = m;
}

// 路线
const itineraryRoute = [[38.853,115.558],[38.905,115.455],[38.8935,115.4785],[38.875,115.535],[38.853,115.558]];
const routeLine = L.polyline(itineraryRoute,{color:'#e74c3c',weight:3,dashArray:'8,8',opacity:.7});

function showGroup(groups){
  // 清除所有
  for(const m of Object.values(markers)) map.removeLayer(m);
  routeLine.remove();
  // 添加需要的
  for(const m of Object.values(markers)){
    if(groups.includes(m._group)) m.addTo(map);
  }
}

function flyToGroup(groups){
  const pts = Object.values(markers).filter(m=>groups.includes(m._group));
  if(pts.length>1){
    const bounds = L.latLngBounds(pts.map(m=>[m.getLatLng().lat,m.getLatLng().lng]));
    map.fitBounds(bounds.pad(0.2));
  } else if(pts.length===1){
    map.setView(pts[0].getLatLng(),14);
  }
}

// 卡片点击 → 地图聚焦
function focusMarker(key){
  const m = markers[key];
  if(!m) return;
  map.setView(m.getLatLng(),15);
  m.openPopup();
}

const tabs = [
  // Tab 0: 行程（来自飞书文档）
  ()=>{
    showGroup(['itinerary']);
    routeLine.addTo(map);
    flyToGroup(['itinerary']);
    return `
<div class="section-title">🚄 清明一日游行程</div>
<div class="card" onclick="focusMarker('station_bd')"><div class="card-header"><div class="card-num" style="background:#7f8c8d">1</div><div class="card-title">🚄 北京西 → 保定东</div></div>
<div class="card-time">08:00 出发 → 08:41 到达</div>
<div class="card-desc">高铁二等座 ¥63/人<div class="card-tag blue">41分钟</div></div></div>

<div class="card" onclick="focusMarker('greenvalley')"><div class="card-header"><div class="card-num" style="background:#27ae60">2</div><div class="card-title">🎢 绿溪谷乐园</div></div>
<div class="card-time">09:00 - 12:00（3小时）</div>
<div class="card-desc">📍 阳光北大街2121号（植物园西北角）<br>过山车、萌宠乐园、卡丁车<br>近20项4-10岁儿童亲子项目<div class="card-tag green">🎫 约¥99/人</div></div></div>

<div class="card" onclick="focusMarker('yanjia')"><div class="card-header"><div class="card-num" style="background:#e74c3c">3</div><div class="card-title">🔥 闫家驴肉老店（华电店）</div></div>
<div class="card-time">12:30 - 13:30</div>
<div class="card-desc">📍 青年路华北电力大学对面<br>携程排名第一，配免费粥+咸菜<br>💡 推荐焖子肉火烧（半肉半肉冻更香）<div class="card-tag red">💰 人均20-30元</div>
<div class="card-warn">⚠️ 过敏OK：驴肉火烧不含坚果，额外点菜注意</div></div></div>

<div class="card" onclick="focusMarker('museum')"><div class="card-header"><div class="card-num" style="background:#8e44ad">4</div><div class="card-title">🦕 中国古动物馆</div></div>
<div class="card-time">14:00 - 16:00（2小时）</div>
<div class="card-desc">📍 东三环与东风东路交叉口东南角<br>亚洲最大自然博物馆！恐龙化石+DIY<br>⚠️ 需提前微信公众号预约<div class="card-tag green">🎫 大人¥40 孩子免费</div></div></div>

<div class="card" onclick="focusMarker('station_bd')"><div class="card-header"><div class="card-num" style="background:#7f8c8d">5</div><div class="card-title">🚄 保定东 → 北京西</div></div>
<div class="card-time">17:00 出发 → 17:41 到达</div>
<div class="card-desc">轻松到家！<div class="card-tag blue">41分钟</div></div></div>
`;},

  // Tab 1: 驴火推荐
  ()=>{
    showGroup(['donkey','itinerary']);
    // 只显示闫家在 itinerary 中
    for(const m of Object.values(markers)){
      if(m._group==='itinerary' && m._key!=='yanjia') map.removeLayer(m);
    }
    flyToGroup(['donkey']);
    markers.yanjia.addTo(map);
    return `
<div class="section-title">🔥 飞书文档推荐（行程已安排）</div>
<div class="card" onclick="focusMarker('yanjia')"><div class="card-header"><div class="card-num" style="background:#e74c3c">①</div><div class="card-title">闫家驴肉老店（华电店）</div></div>
<div class="card-desc">📍 青年路华电对面<br>⭐ 携程排名第一，免费粥+咸菜<div class="card-tag red">行程首选</div><div class="card-tag green">免费粥</div></div></div>

<div class="card" onclick="focusMarker('yongmao')"><div class="card-header"><div class="card-num" style="background:#e74c3c">②</div><div class="card-title">永茂驴肉火烧（创始店）</div></div>
<div class="card-desc">📍 永华北大街<br>20年老牌，建议上午去<br>⚠️ 去晚了火烧卖完<div class="card-tag orange">20年老店</div></div></div>

<div class="card" onclick="focusMarker('caowu')"><div class="card-header"><div class="card-num" style="background:#e74c3c">③</div><div class="card-title">土桥曹家（曹老五）</div></div>
<div class="card-desc">📍 韩村路五四路交叉口<br>"保定最好吃"，认准曹老五的<div class="card-tag orange">老饕级</div></div></div>

<div class="card" onclick="focusMarker('laowang')"><div class="card-header"><div class="card-num" style="background:#e74c3c">④</div><div class="card-title">老王驴肉馄饨面</div></div>
<div class="card-desc">小红书本地人推荐"仅此一家"<div class="card-tag orange">本地人推荐</div></div></div>

<div class="section-title">🫏 备选</div>
<div class="card" onclick="focusMarker('haozw')"><div class="card-header"><div class="card-num" style="background:#f39c12">⑤</div><div class="card-title">好滋味（南大街总店）</div></div>
<div class="card-desc">📍 天威中路保定二中东行100米<br>保定最大连锁，环境好适合带娃<div class="card-tag green">环境好</div></div></div>

<div class="card" onclick="focusMarker('laolvtou')"><div class="card-header"><div class="card-num" style="background:#f39c12">⑥</div><div class="card-title">老驴头（军校广场店）</div></div>
<div class="card-desc">📍 五四东路河大南行500米<br>名气最大连锁，"中国汉堡包"</div></div>

<div class="card" onclick="focusMarker('yuanjia')"><div class="card-header"><div class="card-num" style="background:#f39c12">⑦</div><div class="card-title">袁家驴肉火烧</div></div>
<div class="card-desc">📍 盛兴西路46号<br>清末老店，吴佩孚最爱</div></div>

<div class="card" onclick="focusMarker('sujia')"><div class="card-header"><div class="card-num" style="background:#f39c12">⑧</div><div class="card-title">苏家金饼</div></div>
<div class="card-desc">📍 红旗大街37号<br>独制金饼，更酥脆</div></div>

<div class="card" onclick="focusMarker('fanjia')"><div class="card-header"><div class="card-num" style="background:#f39c12">⑨</div><div class="card-title">范家驴肉火烧</div></div>
<div class="card-desc">📍 盛兴路图书馆对面</div></div>
`;},

  // Tab 2: 其他景点
  ()=>{
    showGroup(['scenic']);
    flyToGroup(['scenic']);
    return `
<div class="section-title">🏛️ 保定经典景点（本次行程未安排）</div>
<div class="card" onclick="focusMarker('zhili')"><div class="card-header"><div class="card-num" style="background:#2c3e50">A</div><div class="card-title">🏛️ 直隶总督署</div></div>
<div class="card-desc">📍 裕华路<br>全国唯一保存完好的清代省级衙署<br>游览约1-1.5h<div class="card-tag blue">🎫 约¥30</div></div></div>

<div class="card" onclick="focusMarker('lotus')"><div class="card-header"><div class="card-num" style="background:#27ae60">B</div><div class="card-title">🪷 古莲花池</div></div>
<div class="card-desc">📍 裕华路<br>中国十大园林之一，小桥流水<br>春天正好看花，游览1-1.5h<div class="card-tag blue">🎫 约¥30</div></div></div>

<div class="card" onclick="focusMarker('daci')"><div class="card-header"><div class="card-num" style="background:#8e44ad">C</div><div class="card-title">🛕 大慈阁</div></div>
<div class="card-desc">📍 穿行楼街<br>保定地标，登高可看全城<br>距莲花池步行10分钟</div></div>

<div class="section-title" style="color:#888">💡 Tips</div>
<div class="card"><div class="card-desc" style="color:#888">这三个景点在老城区，步行可达<br>如果时间充裕或下次来保定，可安排半天<br>也可替换绿溪谷（适合喜欢历史文化的家庭）</div></div>
`;},

  // Tab 3: 清单
  ()=>{
    showGroup([]);
    return `
<div class="section-title">🎒 携带清单</div>
<div class="checklist-item">☐ 外套（清明10-20°C，早晚凉）</div>
<div class="checklist-item">☐ 防晒霜+帽子（户外景点多）</div>
<div class="checklist-item">☐ 充电宝</div>
<div class="checklist-item">☐ 儿童零食+水杯</div>
<div class="checklist-item">☐ 湿巾纸巾（吃火烧必备）</div>
<div class="checklist-item">☐ 身份证（高铁+博物馆预约）</div>

<div class="section-title">⚠️ 行前必做</div>
<div class="checklist-item">☐ 微信预约古动物馆（公众号搜"中国古动物馆"）</div>
<div class="checklist-item">☐ 12306 买票（北京西→保定东 8:00）</div>
<div class="checklist-item">☐ 确认闫家驴肉清明是否营业</div>
<div class="checklist-item">☐ 查保定东站打车/公交到绿溪谷（约20分钟）</div>

<div class="section-title">⚠️ 过敏提醒</div>
<div class="checklist-item" style="color:#e74c3c">🦚 孔雀：核桃过敏</div>
<div class="checklist-item" style="color:#e74c3c">🐎 玥玥：开心果、腰果、山药过敏</div>
<div class="checklist-item" style="color:#e74c3c">👩 Amy：过敏性鼻炎、轻微哮喘</div>
<div class="checklist-item">💡 驴肉火烧本身不含坚果，额外点菜时注意</div>

<div class="section-title">💰 预算估算（4人）</div>
<div class="checklist-item">🚄 高铁往返：¥63×4×2 = ¥504</div>
<div class="checklist-item">🎢 绿溪谷：¥99×4 = ¥396（儿童票可能更低）</div>
<div class="checklist-item">🦕 古动物馆：¥40×2 = ¥80（孩子免费）</div>
<div class="checklist-item">🍽️ 餐饮：约¥150-200</div>
<div class="checklist-item">🚕 打车：约¥100</div>
<div class="checklist-item"><b>合计：约¥1,230-1,280</b></div>
`;}
];

const sidebar = document.getElementById('sidebar');

function selectTab(n){

  if(n===3){
    mapEl.style.display='none';
    sidebar.classList.add('fullscreen');
  } else {
    mapEl.style.display='';
    sidebar.classList.remove('fullscreen');

  sidebar.innerHTML = tabs[n]();
}
