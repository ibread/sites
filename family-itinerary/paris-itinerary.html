const PASSCODE_HASH = 'edf47512eec1fbc8389dda7f4212505250ef02cc376487bdc8abefe8489cb035';
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,'0')).join('');
}
(function initPasscode() {
  const overlay = document.getElementById('passcode-overlay');
  const input = document.getElementById('passcode-input');
  const error = document.getElementById('passcode-error');
  if (sessionStorage.getItem('itinerary_auth') === '1') { overlay.style.display = 'none'; return; }
  input.addEventListener('input', async () => {
    if (input.value.length === 4) {
      const h = await sha256(input.value);
      if (h === PASSCODE_HASH) {
        sessionStorage.setItem('itinerary_auth', '1');
        overlay.style.display = 'none';
      } else {
        error.style.display = 'block';
        input.value = '';
        setTimeout(() => error.style.display = 'none', 2000);
      }
    }
  });
  input.focus();
})();

      { name: { zh: '巴黎迪士尼乐园 Disneyland Paris', en: 'Disneyland Paris' }, desc: { zh: '距市区约40分钟（RER A）。5岁+7岁是迪士尼黄金年龄！建议全天，早开园入场。', en: '~40min from city (RER A). Ages 5 & 7 are the golden Disneyland age! Go full day, arrive at opening.' }, time: { zh: '全天', en: 'All day' }, lat: 48.8674, lng: 2.7812, type: 'kids', emoji: '🎡', travelNext: { zh: '园内步行', en: 'Walk within park' } },
      { name: { zh: '迪士尼园内餐厅', en: 'Park Restaurants' }, desc: { zh: '⚠️ 园内餐厅有过敏原菜单可要求查看（allergen menu）', en: '⚠️ Ask for the allergen menu (allergen menu available at all park restaurants)' }, time: { zh: '午/晚餐', en: 'Lunch / Dinner' }, lat: 48.8678, lng: 2.7820, type: 'food', emoji: '🍔', allergy: true },
    ]
  },
  {
    title: { zh: 'D6 · 自由日 + 返程', en: 'D6 · Free Day + Departure' },
    spots: [
      { name: { zh: '卢森堡公园 Luxembourg Gardens', en: 'Luxembourg Gardens' }, desc: { zh: '骑小马（Poney Club，约4€），船模租借，孩子最爱户外公园之一', en: 'Pony rides (Poney Club ~€4), toy sailboat rental — one of the best parks for kids' }, time: { zh: '上午', en: 'Morning' }, lat: 48.8462, lng: 2.3372, type: 'kids', emoji: '🐴', travelNext: { zh: '🚕 打车 ~30分钟', en: '🚕 Taxi ~30min' } },
      { name: { zh: '法国微型景观园 France Miniature', en: 'France Miniature' }, desc: { zh: '1:30比例法国全景，30分钟车程，适合孩子！若有时间可选。', en: '1:30 scale model of France, 30min drive. Great for kids if time allows.' }, time: { zh: '可选', en: 'Optional' }, lat: 48.7853, lng: 1.9552, type: 'kids', emoji: '🗺️', travelNext: { zh: '🚕 打车 ~50分钟', en: '🚕 Taxi ~50min' } },
      { name: { zh: '戴高乐机场 CDG 返程', en: 'CDG Airport · Departure' }, desc: { zh: '返程航班', en: 'Departure flight' }, time: { zh: '傍晚/晚上', en: 'Evening / Night' }, lat: 49.0097, lng: 2.5479, type: 'hotel', emoji: '✈️' },
    ]
  }
];

const typeColor = { attraction: '#e74c3c', food: '#e67e22', kids: '#27ae60', hotel: '#2980b9' };
let map, markers = [], polylines = [], routeLabels = [], currentDay = 1;

function toggleLang() {
  lang = lang === 'zh' ? 'en' : 'zh';
  document.getElementById('lang-btn').textContent = i18n[lang].langBtn;
  document.getElementById('hdr-title').innerHTML = i18n[lang].title;
  document.getElementById('hdr-sub').textContent = i18n[lang].sub;
  document.getElementById('allergy-banner').innerHTML = i18n[lang].allergy;
  renderTabs();
  selectDay(currentDay);
}

function renderTabs() {
  const labels = i18n[lang].tabs;
  document.getElementById('tabs').innerHTML = [
    `<div class="tab ${currentDay===1?'active':''}" onclick="selectDay(1)">${labels[0]}</div>`,
    `<div class="tab ${currentDay===2?'active':''}" onclick="selectDay(2)">${labels[1]}</div>`,
    `<div class="tab ${currentDay===3?'active':''}" onclick="selectDay(3)">${labels[2]}</div>`,
    `<div class="tab ${currentDay===4?'active':''}" onclick="selectDay(4)">${labels[3]}</div>`,
    `<div class="tab ${currentDay===5?'active':''}" onclick="selectDay(5)">${labels[4]}</div>`,
    `<div class="tab ${currentDay===6?'active':''}" onclick="selectDay(6)">${labels[5]}</div>`,
    `<div class="tab ${currentDay===0?'active':''}" onclick="selectDay(0)">${labels[6]}</div>`,
    `<div class="tab ${currentDay===7?'active':''}" onclick="selectDay(7)">${labels[7]}</div>`,
  ].join('');
}

function initMap() {
  map = L.map('map').setView([48.8566, 2.3522], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);

  const legend = document.createElement('div');
  legend.className = 'legend';
  legend.id = 'legend';
  document.getElementById('map').appendChild(legend);
}

function updateLegend() {
  const labels = i18n[lang].legend;
  const colors = ['#e74c3c','#e67e22','#27ae60','#2980b9'];
  document.getElementById('legend').innerHTML = labels.map((l,i) =>
    `<div class="legend-item"><div class="legend-dot" style="background:${colors[i]}"></div> ${l}</div>`
  ).join('');
}

function clearMarkers() {
  markers.forEach(m => map.removeLayer(m));
  polylines.forEach(p => map.removeLayer(p));
  routeLabels.forEach(l => map.removeLayer(l));
  markers = []; polylines = []; routeLabels = [];
}

function selectDay(n) {
  currentDay = n;
  renderTabs();

  const layout = document.getElementById('layout');
  const dayContent = document.getElementById('day-content');
  const checklistWrap = document.getElementById('checklist-wrap');
  const overviewWrap = document.getElementById('overview-wrap');
  const allergyBanner = document.getElementById('allergy-banner');

  layout.classList.remove('checklist-fullscreen');
  document.getElementById('map').style.display = '';
  allergyBanner.style.display = 'none';
  dayContent.style.display = 'none';
  checklistWrap.style.display = 'none';
  overviewWrap.style.display = 'none';

  if (n === 0) {
    layout.classList.add('checklist-fullscreen');
    document.getElementById('map').style.display = '';
    allergyBanner.style.display = '';
    overviewWrap.style.display = 'block';
    renderOverview();
    // fit map to all spots
    const allBounds = [];
    days.forEach(d => d.spots.forEach(s => allBounds.push([s.lat, s.lng])));
    if (allBounds.length) map.fitBounds(allBounds, { padding: [30,30], paddingTopLeft: [30,80], paddingBottomRight: [30,30] });
    return;
  }
  if (n === 7) {
    layout.classList.add('checklist-fullscreen');
    document.getElementById('map').style.display = 'none';
    allergyBanner.style.display = 'none';
    checklistWrap.style.display = 'block';
    renderChecklist();
    return;
  }

  dayContent.style.display = '';
  clearMarkers();
  const day = days[n - 1];
  dayContent.innerHTML = `
    <div class="day-card">
      <h3>${day.title[lang]}</h3>
      ${day.spots.map((s, i) => `
        <div class="spot" onclick="focusSpot(${i}, ${n})">
          <div class="dot" style="background:${typeColor[s.type]};color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center">${i+1}</div>
          <div class="spot-info">
            <div class="spot-name">${s.emoji} ${s.name[lang]}</div>
            <div class="spot-desc">${s.desc[lang]}</div>
            ${s.time ? `<div class="spot-time">🕐 ${s.time[lang]}</div>` : ''}
            ${s.travelNext ? `<div class="spot-time" style="color:#2980b9">→ ${s.travelNext[lang]}</div>` : ''}
            ${s.allergy ? `<span class="allergy-tag">${i18n[lang].allergyTag}</span>` : ''}
          </div>
        </div>
      `).join('')}
    </div>
  `;

  updateLegend();
  const bounds = [];
  day.spots.forEach((s, i) => {
    const icon = L.divIcon({
      html: `<div style="background:${typeColor[s.type]};color:white;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,0.3)">${i+1}</div>`,
      iconSize: [28,28], iconAnchor: [14,14], className: ''
    });
    const m = L.marker([s.lat, s.lng], { icon })
      .addTo(map)
      .bindPopup(`<b>${s.emoji} ${s.name[lang]}</b><br><small>${s.desc[lang]}</small>`);
    markers.push(m);
    bounds.push([s.lat, s.lng]);

    if (i < day.spots.length - 1) {
      const next = day.spots[i + 1];
      const line = L.polyline([[s.lat, s.lng],[next.lat, next.lng]], {
        color: typeColor[s.type], weight: 4, opacity: 0.7, dashArray: '6,8'
      }).addTo(map);
      polylines.push(line);

      if (s.travelNext) {
        const midLat = (s.lat + next.lat) / 2;
        const midLng = (s.lng + next.lng) / 2;
        const labelColor = typeColor[s.type] || 'rgba(26,47,94,0.85)';
        const label = L.tooltip({ permanent: true, direction: 'right', className: 'route-label', offset: [12, 0] })
          .setLatLng([midLat, midLng])
          .setContent(`<span style="background:${labelColor};padding:3px 8px;border-radius:6px;color:#fff;white-space:nowrap;font-size:11px;font-weight:500;box-shadow:0 2px 6px rgba(0,0,0,0.25)">${s.travelNext[lang]}</span>`)
          .addTo(map);
        routeLabels.push(label);
      }
    }
  });

  if (bounds.length > 0) {
    for (let i = 0; i < day.spots.length - 1; i++) {
      const s = day.spots[i], nx = day.spots[i+1];
      bounds.push([(s.lat+nx.lat)/2, (s.lng+nx.lng)/2]);
    }
    map.fitBounds(bounds, { padding: [30,30], paddingTopLeft: [30,80], paddingBottomRight: [30,30] });
  }
}

function focusSpot(idx, dayN) {
  const s = days[dayN - 1].spots[idx];
  map.setView([s.lat, s.lng], 15);
  markers[idx].openPopup();
}

function renderOverview() {
  document.getElementById('overview-wrap').innerHTML = days.map((day, i) => `
    <div class="overview-day" onclick="selectDay(${i+1})">
      <h4>${day.title[lang]}</h4>
      <div class="route">${day.spots.map(s => s.emoji + ' ' + s.name[lang].split(' ')[0]).join(' → ')}</div>
    </div>
  `).join('');
}

function renderChecklist() {
  const c = i18n[lang].checklist;
  const section = (title, items) => `
    <div class="checklist-section">
      <h3>${title}</h3>
      ${items.map(t => `<div class="check-item"><input type="checkbox"> ${t}</div>`).join('')}
    </div>`;
  document.getElementById('checklist-wrap').innerHTML =
    section(c.pre, c.preItems) +
    section(c.allergy, c.allergyItems) +
    section(c.luggage, c.luggageItems) +
    section(c.tips, c.tipsItems);
}

window.onload = () => {
  initMap();
  document.getElementById('lang-btn').textContent = i18n[lang].langBtn;
  document.getElementById('hdr-title').innerHTML = i18n[lang].title;
  document.getElementById('hdr-sub').textContent = i18n[lang].sub;
  document.getElementById('allergy-banner').innerHTML = i18n[lang].allergy;
  renderTabs();
  selectDay(1);
  setTimeout(() => { map.invalidateSize(); selectDay(currentDay); }, 200);
};
</script>
</body>
</html>
