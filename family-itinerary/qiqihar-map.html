<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>齐齐哈尔地图 Qiqihar Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#1a5276;--accent:#2e86c1;--warm-bg:#f5f7fa;--card-bg:#fff;--text:#333;--sub:#666}
body{font-family:-apple-system,'PingFang SC',BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--warm-bg);color:var(--text)}

header{
  background:linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.55)),
    url('https://images.unsplash.com/photo-1547981609-4b6bfe67ca0b?w=800&q=80') center 40%/cover;
  padding:18px 16px 14px;color:#fff;text-align:center;position:relative
}
header h1{font-size:18px;font-weight:700;text-shadow:0 1px 4px rgba(0,0,0,.5)}
header p{font-size:12px;opacity:.85;margin-top:2px}

.filter-bar{
  background:#fff;padding:8px 12px;display:flex;gap:8px;flex-wrap:wrap;
  border-bottom:1px solid #e8e8e8;justify-content:center
}
.filter-btn{
  padding:4px 12px;border-radius:14px;font-size:12px;border:1px solid #ddd;
  background:#fff;cursor:pointer;transition:all .15s;font-weight:500
}
.filter-btn.active{color:#fff;border-color:transparent}
.filter-btn[data-type="attraction"].active{background:#e74c3c}
.filter-btn[data-type="shopping"].active{background:#8e44ad}
.filter-btn[data-type="all"].active{background:#2c3e50}

.layout{display:flex;flex-direction:column;height:calc(100vh - 110px);min-height:400px}
#map{flex:1;min-height:200px;z-index:1}
.sidebar{order:1;max-height:48vh;overflow-y:auto;padding:10px}

@media(min-width:680px){
  .layout{flex-direction:row}
  #map{order:1;flex:1}
  .sidebar{order:2;width:360px;max-height:none}
}

.section{background:var(--card-bg);border-radius:10px;box-shadow:0 1px 6px rgba(0,0,0,.08);margin-bottom:10px;overflow:hidden}
.section h3{
  color:#fff;padding:9px 14px;font-size:13px;font-weight:600
}
.section h3.attraction-hdr{background:linear-gradient(135deg,#e74c3c,#c0392b)}
.section h3.shopping-hdr{background:linear-gradient(135deg,#8e44ad,#6c3483)}

.spot{display:flex;align-items:flex-start;padding:8px 12px;border-bottom:1px solid #f0ede8;cursor:pointer;transition:background .15s}
.spot:last-child{border-bottom:none}
.spot:hover{background:#f5f0ff}
.spot-dot{
  width:24px;height:24px;border-radius:50%;color:#fff;font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-right:8px;margin-top:2px
}
.spot-info{flex:1}
.spot-name{font-size:13px;font-weight:600}
.spot-desc{font-size:11px;color:var(--sub);margin-top:1px;line-height:1.4}

.marker{
  width:26px;height:26px;border-radius:50%;color:#fff;font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 6px rgba(0,0,0,.3);border:2px solid #fff
}

.legend{
  background:rgba(255,255,255,.92);border-radius:8px;padding:8px 10px;
  font-size:11px;line-height:1.8;box-shadow:0 1px 4px rgba(0,0,0,.15)
}
.legend i{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px;vertical-align:middle}
</style>
</head>
<body>

<header style="position:relative">
  <a href="https://ibread.github.io/sites/index.html" style="position:absolute;top:12px;right:12px;background:rgba(255,255,255,.2);color:white;padding:4px 10px;border-radius:14px;font-size:11px;text-decoration:none;font-weight:600">🏠 首页</a>
  <h1>🦩 齐齐哈尔 · 鹤城玩乐地图</h1>
  <p>景点 · 商业区 一览</p>
</header>

<div class="filter-bar">
  <button class="filter-btn active" data-type="all" onclick="filterType('all')">🗺️ 全部</button>
  <button class="filter-btn" data-type="attraction" onclick="filterType('attraction')">🏞️ 景点</button>
  <button class="filter-btn" data-type="shopping" onclick="filterType('shopping')">🛍️ 商业区</button>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div id="map"></div>
</div>

<script>
const COLORS = {attraction:'#e74c3c', shopping:'#8e44ad'};

const places = [
  // === 景点 ===
  {name:'扎龙自然保护区', desc:'世界著名丹顶鹤栖息地，国家级湿地保护区', lat:47.2124, lng:124.2510, type:'attraction', emoji:'🦩'},
  {name:'龙沙公园', desc:'黑龙江最大综合公园，百年历史，内有望江楼、关帝庙', lat:47.3420, lng:123.9540, type:'attraction', emoji:'🌳'},
  {name:'明月岛', desc:'嫩江上的江心岛，被誉为"北国桃源"，与太阳岛并称姊妹岛', lat:47.3750, lng:123.9200, type:'attraction', emoji:'🏝️'},
  {name:'大乘寺', desc:'东北最大佛教寺院之一，始建于1943年', lat:47.3270, lng:123.9680, type:'attraction', emoji:'🛕'},
  {name:'卜奎清真寺', desc:'始建于1684年（康熙年间），黑龙江规模最大清真寺', lat:47.3520, lng:123.9530, type:'attraction', emoji:'🕌'},
  {name:'劳动湖', desc:'市区中心湖泊，四季风光，冬季冰灯', lat:47.3460, lng:123.9450, type:'attraction', emoji:'💧'},
  {name:'齐齐哈尔博物馆', desc:'了解鹤城历史文化', lat:47.3380, lng:123.9580, type:'attraction', emoji:'🏛️'},
  {name:'嫩江公园', desc:'嫩江畔休闲步道，适合散步看江景', lat:47.3550, lng:123.9350, type:'attraction', emoji:'🌅'},

  // === 商业区 ===
  {name:'万达广场', desc:'齐市最大综合体，购物+影院+餐饮，建华区新江路', lat:47.3630, lng:123.9600, type:'shopping', emoji:'🏬'},
  {name:'百货大楼', desc:'老牌商业地标，卜奎大街55号', lat:47.3440, lng:123.9530, type:'shopping', emoji:'🏪'},
  {name:'中环广场 · 步行街', desc:'齐市核心商圈步行街，吃喝玩乐集中', lat:47.3390, lng:123.9560, type:'shopping', emoji:'🛍️'},
  {name:'大商新玛特', desc:'龙华路中心商场，紧邻中环', lat:47.3410, lng:123.9570, type:'shopping', emoji:'🏬'},
  {name:'大润发', desc:'大型超市，日用百货一站式购物', lat:47.3350, lng:123.9490, type:'shopping', emoji:'🛒'}
];

let currentFilter = 'all';
const markerLayer = L.layerGroup();

// Map
const map = L.map('map',{zoomControl:false}).setView([47.34,123.96],12);
L.control.zoom({position:'topright'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
  attribution:'© OpenStreetMap © CARTO',maxZoom:18
}).addTo(map);
markerLayer.addTo(map);

const legend = L.control({position:'bottomleft'});
legend.onAdd = function(){
  const d = L.DomUtil.create('div','legend');
  d.innerHTML = '<i style="background:#e74c3c"></i>景点<br><i style="background:#8e44ad"></i>商业区';
  return d;
};
legend.addTo(map);

const allMarkers = [];

function render(){
  markerLayer.clearLayers();
  allMarkers.length = 0;
  const filtered = currentFilter==='all' ? places : places.filter(p=>p.type===currentFilter);

  // Sidebar
  const sb = document.getElementById('sidebar');
  const attractions = filtered.filter(p=>p.type==='attraction');
  const shopping = filtered.filter(p=>p.type==='shopping');
  let html = '';

  if(attractions.length){
    html += '<div class="section"><h3 class="attraction-hdr">🏞️ 景点 Attractions</h3>';
    attractions.forEach((p,i)=>{
      const gi = places.indexOf(p);
      html += `<div class="spot" onclick="flyTo(${gi})">
        <div class="spot-dot" style="background:${COLORS.attraction}">${p.emoji}</div>
        <div class="spot-info"><div class="spot-name">${p.name}</div><div class="spot-desc">${p.desc}</div></div>
      </div>`;
    });
    html += '</div>';
  }
  if(shopping.length){
    html += '<div class="section"><h3 class="shopping-hdr">🛍️ 商业区 Shopping</h3>';
    shopping.forEach((p,i)=>{
      const gi = places.indexOf(p);
      html += `<div class="spot" onclick="flyTo(${gi})">
        <div class="spot-dot" style="background:${COLORS.shopping}">${p.emoji}</div>
        <div class="spot-info"><div class="spot-name">${p.name}</div><div class="spot-desc">${p.desc}</div></div>
      </div>`;
    });
    html += '</div>';
  }
  sb.innerHTML = html;

  // Markers
  filtered.forEach((p,i)=>{
    const icon = L.divIcon({
      className:'',
      html:`<div class="marker" style="background:${COLORS[p.type]}">${p.emoji}</div>`,
      iconSize:[26,26],iconAnchor:[13,13]
    });
    const m = L.marker([p.lat,p.lng],{icon}).addTo(markerLayer);
    m.bindPopup(`<b>${p.emoji} ${p.name}</b><br><small>${p.desc}</small>`);
    allMarkers.push({marker:m, place:p, globalIdx:places.indexOf(p)});
  });

  // Fit bounds
  if(filtered.length){
    map.fitBounds(filtered.map(p=>[p.lat,p.lng]),{padding:[40,40]});
  }
}

function flyTo(gi){
  const p = places[gi];
  map.flyTo([p.lat,p.lng],15,{duration:0.8});
  const found = allMarkers.find(m=>m.globalIdx===gi);
  if(found) found.marker.openPopup();
}

function filterType(type){
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.type===type);
  });
  render();
}

render();
</script>
</body>
</html>
