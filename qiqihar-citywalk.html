<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>齐齐哈尔 CityWalk 地图</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#1a5276;--warm-bg:#f5f7fa;--card-bg:#fff;--text:#333;--sub:#666}
body{font-family:-apple-system,'PingFang SC',BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--warm-bg);color:var(--text)}

header{
  background:linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.55)),
    url('https://images.unsplash.com/photo-1547981609-4b6bfe67ca0b?w=800&q=80') center 40%/cover;
  padding:16px 14px 12px;color:#fff;text-align:center;position:relative
}
header h1{font-size:17px;font-weight:700;text-shadow:0 1px 4px rgba(0,0,0,.5)}
header p{font-size:11px;opacity:.85;margin-top:2px}
.source{font-size:10px;opacity:.65;margin-top:4px}
.source a{color:#fff;text-decoration:underline}

.filter-bar{
  background:#fff;padding:6px 10px;display:flex;gap:6px;flex-wrap:wrap;
  border-bottom:1px solid #e8e8e8;justify-content:center
}
.fb{
  padding:3px 10px;border-radius:12px;font-size:11px;border:1px solid #ddd;
  background:#fff;cursor:pointer;transition:all .15s;font-weight:500
}
.fb.active{color:#fff;border-color:transparent}
.fb[data-t="all"].active{background:#2c3e50}
.fb[data-t="attraction"].active{background:#e74c3c}
.fb[data-t="food"].active{background:#e67e22}
.fb[data-t="sports"].active{background:#2980b9}

.layout{display:flex;flex-direction:column;height:calc(100vh - 105px);min-height:400px}
#map{flex:1;min-height:200px;z-index:1}
.sidebar{order:1;max-height:48vh;overflow-y:auto;padding:8px}

@media(min-width:680px){
  .layout{flex-direction:row}
  #map{order:1;flex:1}
  .sidebar{order:2;width:340px;max-height:none}
}

.sec{background:var(--card-bg);border-radius:10px;box-shadow:0 1px 5px rgba(0,0,0,.07);margin-bottom:8px;overflow:hidden}
.sec h3{color:#fff;padding:8px 12px;font-size:12px;font-weight:600}
.sec h3.h-att{background:linear-gradient(135deg,#e74c3c,#c0392b)}
.sec h3.h-food{background:linear-gradient(135deg,#e67e22,#d35400)}
.sec h3.h-sports{background:linear-gradient(135deg,#2980b9,#1a6ea0)}

.sp{display:flex;align-items:flex-start;padding:7px 11px;border-bottom:1px solid #f0ede8;cursor:pointer;transition:background .15s}
.sp:last-child{border-bottom:none}
.sp:hover{background:#faf5ee}
.sp-dot{
  width:22px;height:22px;border-radius:50%;color:#fff;font-size:12px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-right:8px;margin-top:1px
}
.sp-info{flex:1}
.sp-name{font-size:12px;font-weight:600}
.sp-desc{font-size:10.5px;color:var(--sub);margin-top:1px;line-height:1.4}

.marker{
  width:26px;height:26px;border-radius:50%;color:#fff;font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 6px rgba(0,0,0,.3);border:2px solid #fff
}

.legend{
  background:rgba(255,255,255,.92);border-radius:8px;padding:7px 9px;
  font-size:10px;line-height:1.7;box-shadow:0 1px 4px rgba(0,0,0,.15)
}
.legend i{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:3px;vertical-align:middle}
</style>
</head>
<body>

<header>
  <h1>🦩 齐齐哈尔 CityWalk 地图</h1>
  <p>景点 · 美食 · 运动 一览</p>
  <div class="source">参考：小红书 @林小本「齐齐哈尔两天一晚」</div>
</header>

<div class="filter-bar">
  <button class="fb active" data-t="all" onclick="ft('all')">🗺️ 全部</button>
  <button class="fb" data-t="attraction" onclick="ft('attraction')">🏞️ 景点</button>
  <button class="fb" data-t="food" onclick="ft('food')">🍖 美食</button>
  <button class="fb" data-t="sports" onclick="ft('sports')">🏟️ 运动</button>
</div>

<div class="layout">
  <div class="sidebar" id="sb"></div>
  <div id="map"></div>
</div>

<script>
const C={attraction:'#e74c3c',food:'#e67e22',sports:'#2980b9'};
const hdr={attraction:'h-att',food:'h-food',sports:'h-sports'};
const secTitle={attraction:'🏞️ 景点',food:'🍖 美食',sports:'🏟️ 运动'};

const P=[
  // 景点
  {n:'扎龙自然保护区',d:'世界著名丹顶鹤湿地，一年四季可观鹤',lat:47.2124,lng:124.2510,t:'attraction',e:'🦩'},
  {n:'龙沙公园',d:'百年公园，内有望江楼、关帝庙、劳动湖、"江山如此多娇"石刻',lat:47.3420,lng:123.9540,t:'attraction',e:'🌳'},
  {n:'龙沙动植物园',d:'东北最大动植物园，4A景区，带娃必去',lat:47.3900,lng:123.9350,t:'attraction',e:'🦁'},
  {n:'明月岛',d:'嫩江江心岛，"北国桃源"，与太阳岛并称姊妹岛',lat:47.3750,lng:123.9200,t:'attraction',e:'🏝️'},
  {n:'大乘寺',d:'始建于1943年，东北名刹',lat:47.3270,lng:123.9680,t:'attraction',e:'🛕'},
  {n:'卜奎清真寺',d:'始建于1684年（康熙年间），黑龙江最大清真寺',lat:47.3520,lng:123.9530,t:'attraction',e:'🕌'},
  {n:'龙沙早市 / 夜市',d:'龙沙公园附近，当地人气集市',lat:47.3430,lng:123.9510,t:'attraction',e:'🌙'},

  // 美食
  {n:'米家烤肉（总店）',d:'齐齐哈尔烤肉代表，清真，肉质带奶香，人均60+',lat:47.3580,lng:123.9480,t:'food',e:'🥩'},
  {n:'付胖子鸡骨架大串',d:'必点宫后夹肉，烧烤夜宵人气店',lat:47.3450,lng:123.9560,t:'food',e:'🍗'},
  {n:'顺玉大片肉（劳动桥店）',d:'朝鲜族式烤肉 + 超好吃冷面',lat:47.3400,lng:123.9490,t:'food',e:'🥘'},

  // 运动
  {n:'齐齐哈尔体育运动中心',d:'市体育馆，湖滨街道',lat:47.3370,lng:123.9380,t:'sports',e:'🏟️'}
];

let cf='all';
const ml=L.layerGroup();
const map=L.map('map',{zoomControl:false}).setView([47.34,123.96],12);
L.control.zoom({position:'topright'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
  attribution:'© OpenStreetMap © CARTO',maxZoom:18
}).addTo(map);
ml.addTo(map);

const lg=L.control({position:'bottomleft'});
lg.onAdd=function(){
  const d=L.DomUtil.create('div','legend');
  d.innerHTML='<i style="background:#e74c3c"></i>景点<br><i style="background:#e67e22"></i>美食<br><i style="background:#2980b9"></i>运动';
  return d;
};
lg.addTo(map);

let mks=[];

function render(){
  ml.clearLayers(); mks=[];
  const fp=cf==='all'?P:P.filter(p=>p.t===cf);

  // sidebar
  const sb=document.getElementById('sb');
  const groups={};
  fp.forEach(p=>{if(!groups[p.t])groups[p.t]=[];groups[p.t].push(p)});
  let h='';
  for(const t of ['attraction','food','sports']){
    if(!groups[t])continue;
    h+=`<div class="sec"><h3 class="${hdr[t]}">${secTitle[t]}</h3>`;
    groups[t].forEach(p=>{
      const gi=P.indexOf(p);
      h+=`<div class="sp" onclick="fly(${gi})">
        <div class="sp-dot" style="background:${C[p.t]}">${p.e}</div>
        <div class="sp-info"><div class="sp-name">${p.n}</div><div class="sp-desc">${p.d}</div></div>
      </div>`;
    });
    h+='</div>';
  }
  sb.innerHTML=h;

  // markers
  fp.forEach(p=>{
    const ic=L.divIcon({className:'',html:`<div class="marker" style="background:${C[p.t]}">${p.e}</div>`,iconSize:[26,26],iconAnchor:[13,13]});
    const m=L.marker([p.lat,p.lng],{icon:ic}).addTo(ml);
    m.bindPopup(`<b>${p.e} ${p.n}</b><br><small>${p.d}</small>`);
    mks.push({m,gi:P.indexOf(p)});
  });

  if(fp.length) map.fitBounds(fp.map(p=>[p.lat,p.lng]),{padding:[40,40]});
}

function fly(gi){
  const p=P[gi];
  map.flyTo([p.lat,p.lng],15,{duration:.8});
  const f=mks.find(x=>x.gi===gi);
  if(f)f.m.openPopup();
}

function ft(t){
  cf=t;
  document.querySelectorAll('.fb').forEach(b=>b.classList.toggle('active',b.dataset.t===t));
  render();
}

render();
</script>
</body>
</html>
