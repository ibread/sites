<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>首尔江南半日游 Seoul Gangnam Half-Day</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5}
.banner{background:linear-gradient(rgba(15,52,96,0.7),rgba(26,26,46,0.85)),url('https://images.unsplash.com/photo-1538485399081-7191377e8241?w=800&q=80');background-size:cover;background-position:center 40%;color:#fff;padding:28px 16px 20px;text-align:center}
.banner h1{font-size:1.4em;margin-bottom:4px}
.banner .sub{font-size:.85em;opacity:.8}
.tabs{display:flex;gap:6px;padding:10px 12px;background:#fff;border-bottom:1px solid #e0e0e0;overflow-x:auto;flex-wrap:nowrap}
.tab{padding:8px 16px;border-radius:20px;font-size:.85em;cursor:pointer;white-space:nowrap;border:1px solid #ddd;background:#fff;color:#333;transition:.2s}
.tab.active{background:#0f3460;color:#fff;border-color:#0f3460}
#map{height:55vh;min-height:300px}
.sidebar{display:none;padding:12px 16px;max-height:70vh;overflow-y:auto}
.sidebar.show{display:block}
.itinerary{padding:12px 16px;background:#fff;display:none}
.itinerary.show{display:block}
.itin-step{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0}
.itin-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;flex-shrink:0}
.itin-body{flex:1}
.itin-body .itin-name{font-weight:600;font-size:.95em}
.itin-body .itin-time{font-size:.8em;color:#888;margin-top:1px}
.itin-body .itin-desc{font-size:.85em;color:#555;margin-top:3px;line-height:1.4}
.spot{padding:10px 0;border-bottom:1px solid #eee}
.spot .name{font-weight:600;font-size:.95em}
.spot .meta{font-size:.8em;color:#666;margin-top:2px}
.spot .desc{font-size:.85em;color:#444;margin-top:4px}
.legend{padding:8px 12px;background:#fff;font-size:.75em;color:#666;display:flex;gap:12px;flex-wrap:wrap;border-top:1px solid #eee}
.legend span::before{content:'';display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px;vertical-align:middle}
.legend .cat-sight::before{background:#e74c3c}
.legend .cat-food::before{background:#e67e22}
.legend .cat-cafe::before{background:#8e44ad}
.legend .cat-shop::before{background:#2ecc71}
.lang-btn{position:absolute;top:12px;right:12px;z-index:10;background:rgba(255,255,255,.9);border:1px solid #ccc;border-radius:4px;padding:4px 10px;font-size:.8em;cursor:pointer}
@media(max-width:680px){#map{height:45vh}.sidebar{max-height:50vh}}
</style>
</head>
<body>
<div class="banner" style="position:relative">
  <button class="lang-btn" onclick="toggleLang()" id="langBtn">EN</button>
  <h1 data-zh="🇰🇷 首尔江南半日游" data-en="🇰🇷 Seoul Gangnam Half-Day">🇰🇷 首尔江南半日游</h1>
  <div class="sub" data-zh="ZQ · 半天轻松散步" data-en="ZQ · Half-day leisurely walk">ZQ · 半天轻松散步</div>
</div>

<div class="tabs" id="tabs">
  <div class="tab active" data-plan="A" data-zh="Plan A 文艺散步" data-en="Plan A Art Walk">Plan A 文艺散步</div>
  <div class="tab" data-plan="B" data-zh="Plan B 城市体验" data-en="Plan B City Vibe">Plan B 城市体验</div>
  <div class="tab" data-plan="list" data-zh="📋 清单" data-en="📋 List">📋 清单</div>
</div>

<div id="map"></div>
<div class="itinerary" id="itinerary"></div>
<div class="sidebar" id="sidebar"></div>

<div class="legend">
  <span class="cat-sight" data-zh="景点" data-en="Sight">景点</span>
  <span class="cat-food" data-zh="美食" data-en="Food">美食</span>
  <span class="cat-cafe" data-zh="咖啡" data-en="Café">咖啡</span>
  <span class="cat-shop" data-zh="购物" data-en="Shopping">购物</span>
</div>

<script>
const COLORS={sight:'#e74c3c',food:'#e67e22',cafe:'#8e44ad',shop:'#2ecc71'};
const PLANS={
  A:[
    {name:'岛山公园 Dosan Park',lat:37.5224,lng:127.0398,cat:'sight',time:'10:00-11:00',
     desc_zh:'江南最有氛围感的街区，散步+咖啡。Hermès 爱马仕之家有免费博物馆和咖啡厅。',
     desc_en:'Most atmospheric neighborhood in Gangnam. Hermès Maison has a free museum & café.'},
    {name:'岛山公园咖啡街 Dosan Café Street',lat:37.5218,lng:127.0385,cat:'cafe',time:'11:00-11:30',
     desc_zh:'周边独立精品咖啡馆密集，随便走进一家都不错。',
     desc_en:'Dense cluster of indie specialty cafés. Pick any one—they\'re all good.'},
    {name:'新沙洞林荫道 Garosugil',lat:37.5193,lng:127.0233,cat:'sight',time:'11:30-13:00',
     desc_zh:'首尔最经典的银杏林荫道，两边全是设计师店、买手店、甜品店。不用特意找，随意逛。',
     desc_en:'Seoul\'s iconic ginkgo-lined avenue. Designer boutiques, pastry shops on both sides.'},
    {name:'校村炸鸡（新沙店）Kyochon Chicken Sinsa',lat:37.5175,lng:127.0221,cat:'food',time:'13:00-14:00',
     desc_zh:'原味+芝士粉双拼配啤酒，本地人午餐热门选择。',
     desc_en:'Original + cheese powder combo with beer. Popular local lunch spot.'},
  ],
  B:[
    {name:'COEX Mall 星空图书馆 Starfield Library',lat:37.5113,lng:127.0594,cat:'sight',time:'10:00-12:00',
     desc_zh:'韩国最大地下商城，星空图书馆免费拍照超出片。Line Friends 旗舰店在这。',
     desc_en:'Korea\'s largest underground mall. Starfield Library is free & photogenic. Line Friends flagship here.'},
    {name:'COEX 美食区 COEX Food Court',lat:37.5110,lng:127.0600,cat:'food',time:'12:00-13:00',
     desc_zh:'地下层选择丰富，韩式/日式/西式都有，人均合理。',
     desc_en:'Basement level with Korean/Japanese/Western options. Reasonably priced.'},
    {name:'狎鸥亭罗德奥街 Apgujeong Rodeo',lat:37.5269,lng:127.0403,cat:'shop',time:'13:30-15:00',
     desc_zh:'江南"潮牌街"。Gentle Monster 狎鸥亭店像逛展览馆，Galleria 百货顶楼有江南夜景。',
     desc_en:'Gangnam\'s fashion street. Gentle Monster flagship is like an art gallery. Galleria rooftop has great views.'},
    {name:'清潭洞十字路口 Cheongdam Intersection',lat:37.5245,lng:127.0503,cat:'sight',time:'15:00-15:30',
     desc_zh:'韩剧取景地，霓虹灯+车水马龙。路过 SM 公司碰运气。',
     desc_en:'K-drama filming spot. Neon lights & traffic. SM Entertainment HQ nearby—might spot an idol.'},
  ]
};

let currentPlan='A', currentLang='zh';
const map=L.map('map').setView([37.52,127.04],14);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(map);

let markers=[], polyline=null;

function renderPlan(plan){
  currentPlan=plan;
  const mapEl=document.getElementById('map');
  const sidebar=document.getElementById('sidebar');
  const itin=document.getElementById('itinerary');
  if(plan==='list'){
    mapEl.style.display='none';
    itin.classList.remove('show');
    sidebar.classList.add('show');
    let html='';
    ['A','B'].forEach(p=>{
      const label=currentLang==='zh'?(p==='A'?'Plan A 文艺散步':'Plan B 城市体验'):(p==='A'?'Plan A Art Walk':'Plan B City Vibe');
      html+=`<h3 style="margin:12px 0 6px">${label}</h3>`;
      PLANS[p].forEach(s=>{
        const desc=currentLang==='zh'?s.desc_zh:s.desc_en;
        html+=`<div class="spot"><div class="name" style="color:${COLORS[s.cat]}">${s.name}</div><div class="meta">⏰ ${s.time}</div><div class="desc">${desc}</div></div>`;
      });
    });
    sidebar.innerHTML=html;
    return;
  }
  mapEl.style.display='block';
  sidebar.classList.remove('show');
  itin.classList.add('show');
  markers.forEach(m=>map.removeLayer(m));
  markers=[];
  if(polyline)map.removeLayer(polyline);
  const spots=PLANS[plan];
  const latlngs=[];
  spots.forEach((s,i)=>{
    const desc=currentLang==='zh'?s.desc_zh:s.desc_en;
    const icon=L.divIcon({className:'',html:`<div style="background:${COLORS[s.cat]};color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3)">${i+1}</div>`,iconSize:[24,24],iconAnchor:[12,12]});
    const m=L.marker([s.lat,s.lng],{icon}).addTo(map).bindPopup(`<b>${s.name}</b><br>⏰ ${s.time}<br>${desc}`);
    markers.push(m);
    latlngs.push([s.lat,s.lng]);
  });
  polyline=L.polyline(latlngs,{color:'#0f3460',weight:3,dashArray:'8 6',opacity:.7}).addTo(map);
  map.fitBounds(L.latLngBounds(latlngs).pad(0.15));
  // render itinerary panel
  let ih='';
  spots.forEach((s,i)=>{
    const desc=currentLang==='zh'?s.desc_zh:s.desc_en;
    ih+=`<div class="itin-step"><div class="itin-num" style="background:${COLORS[s.cat]}">${i+1}</div><div class="itin-body"><div class="itin-name">${s.name}</div><div class="itin-time">⏰ ${s.time}</div><div class="itin-desc">${desc}</div></div></div>`;
  });
  itin.innerHTML=ih;
}

document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    renderPlan(t.dataset.plan);
  });
});

function toggleLang(){
  currentLang=currentLang==='zh'?'en':'zh';
  document.getElementById('langBtn').textContent=currentLang==='zh'?'EN':'中';
  document.querySelectorAll('[data-zh]').forEach(el=>{
    if(el.tagName==='INPUT'||el.tagName==='BUTTON')return;
    el.textContent=el.getAttribute('data-'+currentLang);
  });
  renderPlan(currentPlan);
}

renderPlan('A');
</script>
</body>
</html>
